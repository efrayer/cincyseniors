<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDA JSON Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary-400: #60a5fa; --primary-500: #3b82f6; --primary-600: #2563eb; --primary-700: #1d4ed8;
            --gray-100: #f3f4f6; --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
            --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
            --success-500: #22c55e; --danger-500: #ef4444; --danger-600: #dc2626;
            --syntax-string: #a5d6ff; --syntax-number: #79c0ff; --syntax-boolean: #ff7b72;
            --syntax-null: #ffa657; --syntax-key: #7ee787; --syntax-bracket: #8b949e;
            --header-height: 60px; --border-radius: 8px; --transition-speed: 0.2s;
        }
        html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--gray-900); color: var(--gray-100); line-height: 1.6; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .app-header { height: var(--header-height); background: linear-gradient(135deg, var(--gray-800), var(--gray-900)); border-bottom: 1px solid var(--gray-700); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; font-family: 'JetBrains Mono', monospace; }
        .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--primary-400), #bfdbfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header-actions { display: flex; gap: 10px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; font-size: 14px; font-weight: 500; font-family: inherit; border: none; border-radius: var(--border-radius); cursor: pointer; transition: all var(--transition-speed) ease; white-space: nowrap; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-500), var(--primary-600)); color: white; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover { background: linear-gradient(135deg, var(--primary-400), var(--primary-500)); box-shadow: 0 4px 8px rgba(37, 99, 235, 0.4); transform: translateY(-1px); }
        .btn-secondary { background: var(--gray-700); color: var(--gray-100); border: 1px solid var(--gray-600); }
        .btn-secondary:hover { background: var(--gray-600); border-color: var(--gray-500); }
        .btn-danger { background: var(--danger-500); color: white; }
        .btn-danger:hover { background: var(--danger-600); }
        .btn-icon { padding: 10px; }
        .btn svg { width: 18px; height: 18px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .pane-header { height: 44px; background: var(--gray-800); border-bottom: 1px solid var(--gray-700); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
        .pane-title { font-size: 13px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .pane-title svg { width: 16px; height: 16px; }
        .pane-actions { display: flex; gap: 6px; }
        .pane-actions .btn { padding: 6px 10px; font-size: 12px; }
        .pane-actions .btn svg { width: 14px; height: 14px; }
        .editor-pane { border-right: 1px solid var(--gray-700); }
        .editor-wrapper { flex: 1; position: relative; overflow: hidden; }
        .json-editor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.7; background: var(--gray-900); color: var(--gray-300); caret-color: var(--primary-400); border: none; outline: none; resize: none; overflow-y: auto; tab-size: 2; }
        .json-editor::placeholder { color: var(--gray-600); }
        .json-editor::selection { background: var(--primary-600); color: white; }
        .preview-pane { background: var(--gray-900); }
        .preview-content { flex: 1; overflow-y: auto; padding: 20px; }
        .resizer { width: 4px; background: var(--gray-700); cursor: col-resize; transition: background var(--transition-speed) ease; flex-shrink: 0; }
        .resizer:hover, .resizer.active { background: var(--primary-500); }
        .json-tree { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8; }
        .json-node { position: relative; }
        .json-node-content { display: flex; align-items: flex-start; padding: 2px 4px; border-radius: 4px; margin-left: -4px; }
        .json-node-content:hover { background: rgba(255, 255, 255, 0.03); }
        .json-node-content.expandable { cursor: pointer; }
        .json-toggle { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--gray-500); transition: transform var(--transition-speed) ease; flex-shrink: 0; margin-top: 2px; }
        .json-toggle svg { width: 14px; height: 14px; }
        .json-toggle.expanded { transform: rotate(90deg); }
        .json-toggle-placeholder { width: 18px; flex-shrink: 0; }
        .json-key { color: var(--syntax-key); }
        .json-colon { color: var(--gray-400); margin: 0 6px; }
        .json-string { color: var(--syntax-string); word-break: break-word; }
        .json-number { color: var(--syntax-number); }
        .json-boolean { color: var(--syntax-boolean); }
        .json-null { color: var(--syntax-null); font-style: italic; }
        .json-bracket { color: var(--syntax-bracket); }
        .json-collapsed-info { color: var(--gray-500); font-size: 12px; margin-left: 4px; }
        .json-children { margin-left: 20px; padding-left: 16px; border-left: 1px solid var(--gray-700); }
        .json-closing-bracket { color: var(--syntax-bracket); margin-left: 20px; }
        .error-display { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger-500); border-radius: var(--border-radius); padding: 16px; color: #fca5a5; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
        .error-display .error-title { font-weight: 600; margin-bottom: 8px; color: var(--danger-500); }
        .error-display .error-line { color: var(--gray-400); margin-top: 8px; font-size: 12px; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--gray-500); text-align: center; padding: 40px; }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; color: var(--gray-400); }
        .empty-state-text { font-size: 14px; }
        .status-bar { height: 28px; background: var(--gray-800); border-top: 1px solid var(--gray-700); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 12px; color: var(--gray-500); }
        .status-bar-left, .status-bar-right { display: flex; align-items: center; gap: 16px; }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-item.valid { color: var(--success-500); }
        .status-item.invalid { color: var(--danger-500); }
        .status-item svg { width: 14px; height: 14px; }
        .toast-container { position: fixed; bottom: 52px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--gray-800); border-radius: var(--border-radius); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); border: 1px solid var(--gray-700); transform: translateX(120%); transition: transform 0.3s ease; max-width: 360px; }
        .toast.show { transform: translateX(0); }
        .toast-icon { width: 20px; height: 20px; flex-shrink: 0; }
        .toast-icon svg { width: 100%; height: 100%; }
        .toast.success .toast-icon { color: var(--success-500); }
        .toast.error .toast-icon { color: var(--danger-500); }
        .toast-message { font-size: 14px; color: var(--gray-100); }
        .hidden-input { display: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--gray-800); }
        ::-webkit-scrollbar-thumb { background: var(--gray-600); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-500); }
        @media (max-width: 900px) { .header-actions .btn-text { display: none; } .header-actions .btn { padding: 10px; } }
        @media (max-width: 768px) { .main-content { flex-direction: column; } .resizer { display: none; } .pane { min-height: 40vh; } .editor-pane { border-right: none; border-bottom: 1px solid var(--gray-700); } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">{}</div>
                <span class="logo-text">TDA JSON Viewer</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="importBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span class="btn-text">Import</span>
                </button>
                <button class="btn btn-secondary" id="exportBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span class="btn-text">Export</span>
                </button>
                <button class="btn btn-secondary" id="copyBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span class="btn-text">Copy</span>
                </button>
                <button class="btn btn-secondary" id="formatBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                    <span class="btn-text">Format</span>
                </button>
                <button class="btn btn-secondary" id="minifyBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                    <span class="btn-text">Minify</span>
                </button>
                <button class="btn btn-danger btn-icon" id="clearBtn" title="Clear">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
        </header>
        <input type="file" id="fileInput" class="hidden-input" accept=".json,application/json">
        <main class="main-content">
            <div class="pane editor-pane" id="editorPane">
                <div class="pane-header">
                    <div class="pane-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                        Editor
                    </div>
                    <div class="pane-actions">
                        <button class="btn btn-secondary" id="loadDemoBtn">Load Demo</button>
                    </div>
                </div>
                <div class="editor-wrapper">
                    <textarea class="json-editor" id="jsonEditor" placeholder="Paste or type your JSON here...

Or drag and drop a .json file

Or click 'Import' to load a file" spellcheck="false"></textarea>
                </div>
            </div>
            <div class="resizer" id="resizer"></div>
            <div class="pane preview-pane">
                <div class="pane-header">
                    <div class="pane-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        Preview
                    </div>
                    <div class="pane-actions">
                        <button class="btn btn-secondary btn-icon" id="expandAllBtn" title="Expand All">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        </button>
                        <button class="btn btn-secondary btn-icon" id="collapseAllBtn" title="Collapse All">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        </button>
                    </div>
                </div>
                <div class="preview-content" id="previewContent">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                        <div class="empty-state-title">No JSON to preview</div>
                        <div class="empty-state-text">Enter valid JSON in the editor to see the tree view</div>
                    </div>
                    <div class="json-tree" id="jsonTree" style="display: none;"></div>
                    <div class="error-display" id="errorDisplay" style="display: none;"></div>
                </div>
            </div>
        </main>
        <div class="status-bar">
            <div class="status-bar-left">
                <div class="status-item" id="validationStatus">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
                    <span>Ready</span>
                </div>
            </div>
            <div class="status-bar-right">
                <div class="status-item" id="charCount">0 characters</div>
                <div class="status-item" id="lineCount">0 lines</div>
            </div>
        </div>
        <div class="toast-container" id="toastContainer"></div>
    </div>
    <script>
        const state = { jsonData: null, isValid: false, errorInfo: null, fileName: 'data.json', expandedNodes: new Set(), isResizing: false, debounceTimer: null };
        const elements = {
            fileInput: document.getElementById('fileInput'), jsonEditor: document.getElementById('jsonEditor'),
            jsonTree: document.getElementById('jsonTree'), previewContent: document.getElementById('previewContent'),
            emptyState: document.getElementById('emptyState'), errorDisplay: document.getElementById('errorDisplay'),
            toastContainer: document.getElementById('toastContainer'), validationStatus: document.getElementById('validationStatus'),
            charCount: document.getElementById('charCount'), lineCount: document.getElementById('lineCount'),
            editorPane: document.getElementById('editorPane'), resizer: document.getElementById('resizer'),
            importBtn: document.getElementById('importBtn'), exportBtn: document.getElementById('exportBtn'),
            copyBtn: document.getElementById('copyBtn'), formatBtn: document.getElementById('formatBtn'),
            minifyBtn: document.getElementById('minifyBtn'), clearBtn: document.getElementById('clearBtn'),
            loadDemoBtn: document.getElementById('loadDemoBtn'), expandAllBtn: document.getElementById('expandAllBtn'),
            collapseAllBtn: document.getElementById('collapseAllBtn')
        };

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-icon">${type === 'success' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'}</span><span class="toast-message">${message}</span>`;
            elements.toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function validateAndParse(content) {
            if (!content.trim()) { state.jsonData = null; state.isValid = false; state.errorInfo = null; return; }
            try {
                state.jsonData = JSON.parse(content); state.isValid = true; state.errorInfo = null;
                state.expandedNodes.clear(); initializeExpandedNodes(state.jsonData, '', 0, 2);
            } catch (e) {
                state.jsonData = null; state.isValid = false;
                const match = e.message.match(/position (\d+)/);
                const position = match ? parseInt(match[1]) : null;
                let line = null, column = null;
                if (position !== null) { const lines = content.substring(0, position).split('\n'); line = lines.length; column = lines[lines.length - 1].length + 1; }
                state.errorInfo = { message: e.message, position, line, column };
            }
        }

        function initializeExpandedNodes(data, path, depth, maxDepth) {
            if (depth >= maxDepth || typeof data !== 'object' || data === null) return;
            state.expandedNodes.add(path || 'root');
            Object.keys(data).forEach(key => initializeExpandedNodes(data[key], path ? `${path}.${key}` : key, depth + 1, maxDepth));
        }

        function updatePreview() {
            const content = elements.jsonEditor.value;
            validateAndParse(content);
            if (!content.trim()) { elements.emptyState.style.display = 'flex'; elements.jsonTree.style.display = 'none'; elements.errorDisplay.style.display = 'none'; }
            else if (state.isValid) { elements.emptyState.style.display = 'none'; elements.jsonTree.style.display = 'block'; elements.errorDisplay.style.display = 'none'; renderTree(); }
            else { elements.emptyState.style.display = 'none'; elements.jsonTree.style.display = 'none'; elements.errorDisplay.style.display = 'block'; renderError(); }
            updateStatusBar();
        }

        function updateStatusBar() {
            const content = elements.jsonEditor.value;
            elements.charCount.textContent = `${content.length.toLocaleString()} characters`;
            elements.lineCount.textContent = `${(content ? content.split('\n').length : 0).toLocaleString()} lines`;
            if (!content.trim()) { elements.validationStatus.className = 'status-item'; elements.validationStatus.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg><span>Ready</span>`; }
            else if (state.isValid) { elements.validationStatus.className = 'status-item valid'; elements.validationStatus.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Valid JSON</span>`; }
            else { elements.validationStatus.className = 'status-item invalid'; elements.validationStatus.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span>Invalid JSON</span>`; }
        }

        function renderError() {
            const { message, line, column } = state.errorInfo;
            elements.errorDisplay.innerHTML = `<div class="error-title">⚠ JSON Parse Error</div><div>${escapeHtml(message)}</div>${line !== null ? `<div class="error-line">Line ${line}, Column ${column}</div>` : ''}`;
        }

        function getValueType(value) { if (value === null) return 'null'; if (Array.isArray(value)) return 'array'; return typeof value; }
        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

        function renderValue(value, type) {
            switch (type) {
                case 'string': return `<span class="json-string">"${escapeHtml(value)}"</span>`;
                case 'number': return `<span class="json-number">${value}</span>`;
                case 'boolean': return `<span class="json-boolean">${value}</span>`;
                case 'null': return `<span class="json-null">null</span>`;
                default: return escapeHtml(String(value));
            }
        }

        function renderNode(key, value, path, isArrayItem = false) {
            const type = getValueType(value);
            const isExpandable = type === 'object' || type === 'array';
            const nodePath = path || 'root';
            const isExpanded = state.expandedNodes.has(nodePath);
            const isEmpty = isExpandable && Object.keys(value).length === 0;
            let html = '<div class="json-node">';
            html += `<div class="json-node-content${isExpandable && !isEmpty ? ' expandable' : ''}" data-path="${nodePath}">`;
            if (isExpandable && !isEmpty) { html += `<span class="json-toggle${isExpanded ? ' expanded' : ''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>`; }
            else { html += '<span class="json-toggle-placeholder"></span>'; }
            if (key !== null && !isArrayItem) { html += `<span class="json-key">"${escapeHtml(String(key))}"</span><span class="json-colon">:</span>`; }
            if (!isExpandable) { html += renderValue(value, type); }
            else if (isEmpty) { html += `<span class="json-bracket">${type === 'array' ? '[]' : '{}'}</span>`; }
            else {
                html += `<span class="json-bracket">${type === 'array' ? '[' : '{'}</span>`;
                if (!isExpanded) { const count = Object.keys(value).length; html += `<span class="json-collapsed-info">…${count} ${count === 1 ? 'item' : 'items'}</span><span class="json-bracket">${type === 'array' ? ']' : '}'}</span>`; }
            }
            html += '</div>';
            if (isExpandable && !isEmpty && isExpanded) {
                html += '<div class="json-children">';
                Object.entries(value).forEach(([k, v]) => { html += renderNode(type === 'array' ? parseInt(k) : k, v, path ? `${path}.${k}` : k, type === 'array'); });
                html += `</div><span class="json-closing-bracket">${type === 'array' ? ']' : '}'}</span>`;
            }
            html += '</div>';
            return html;
        }

        function renderTree() {
            if (!state.jsonData) return;
            elements.jsonTree.innerHTML = renderNode(null, state.jsonData, '');
            elements.jsonTree.querySelectorAll('.json-node-content.expandable').forEach(node => {
                node.addEventListener('click', () => {
                    const path = node.dataset.path;
                    if (state.expandedNodes.has(path)) state.expandedNodes.delete(path); else state.expandedNodes.add(path);
                    renderTree();
                });
            });
        }

        function expandAll() {
            if (!state.jsonData) return;
            function addAllPaths(data, path) { if (typeof data !== 'object' || data === null) return; state.expandedNodes.add(path || 'root'); Object.keys(data).forEach(key => addAllPaths(data[key], path ? `${path}.${key}` : key)); }
            addAllPaths(state.jsonData, ''); renderTree();
        }

        function collapseAll() { state.expandedNodes.clear(); renderTree(); }

        function handleFileSelect(event) {
            const file = event.target.files?.[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { elements.jsonEditor.value = e.target.result; state.fileName = file.name; updatePreview(); showToast(`Loaded ${file.name}`, 'success'); };
            reader.onerror = () => showToast('Failed to read file', 'error');
            reader.readAsText(file); event.target.value = '';
        }

        function handleDrop(event) {
            event.preventDefault();
            const file = event.dataTransfer.files?.[0]; if (!file) return;
            if (!file.name.endsWith('.json')) { showToast('Please drop a .json file', 'error'); return; }
            const reader = new FileReader();
            reader.onload = (e) => { elements.jsonEditor.value = e.target.result; state.fileName = file.name; updatePreview(); showToast(`Loaded ${file.name}`, 'success'); };
            reader.readAsText(file);
        }

        function exportJson() {
            const content = elements.jsonEditor.value; if (!content.trim()) { showToast('Nothing to export', 'error'); return; }
            const blob = new Blob([content], { type: 'application/json' }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = state.fileName; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast('JSON exported successfully', 'success');
        }

        function copyJson() {
            const content = elements.jsonEditor.value; if (!content.trim()) { showToast('Nothing to copy', 'error'); return; }
            navigator.clipboard.writeText(content).then(() => showToast('Copied to clipboard', 'success')).catch(() => showToast('Failed to copy', 'error'));
        }

        function formatJson() {
            if (!state.isValid || !state.jsonData) { showToast('Cannot format invalid JSON', 'error'); return; }
            elements.jsonEditor.value = JSON.stringify(state.jsonData, null, 2); updatePreview(); showToast('JSON formatted', 'success');
        }

        function minifyJson() {
            if (!state.isValid || !state.jsonData) { showToast('Cannot minify invalid JSON', 'error'); return; }
            elements.jsonEditor.value = JSON.stringify(state.jsonData); updatePreview(); showToast('JSON minified', 'success');
        }

        function clearEditor() { elements.jsonEditor.value = ''; state.fileName = 'data.json'; updatePreview(); }

        function loadDemoData() {
            const demoData = { "project": "TDA JSON Viewer", "version": "1.0.0", "description": "A professional JSON viewer with live preview", "author": { "name": "Eric", "role": "Principal BI Architect", "company": "Onebridge/Marlabs", "website": "thinkdataanalysis.com" }, "features": ["Live JSON editing", "Real-time tree preview", "Syntax validation", "Format & minify", "Import & export", "Copy to clipboard"], "settings": { "theme": "dark", "colors": { "primary": "#3b82f6", "background": "#111827", "syntax": { "string": "#a5d6ff", "number": "#79c0ff", "boolean": "#ff7b72", "null": "#ffa657", "key": "#7ee787" } } }, "stats": { "linesOfCode": 1200, "features": 6 }, "isActive": true, "lastUpdated": null };
            elements.jsonEditor.value = JSON.stringify(demoData, null, 2); state.fileName = 'demo-data.json'; updatePreview(); showToast('Demo data loaded', 'success');
        }

        function initResizer() {
            let startX, startWidth;
            elements.resizer.addEventListener('mousedown', (e) => { state.isResizing = true; startX = e.clientX; startWidth = elements.editorPane.offsetWidth; elements.resizer.classList.add('active'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
            document.addEventListener('mousemove', (e) => { if (!state.isResizing) return; const diff = e.clientX - startX; const newWidth = startWidth + diff; const containerWidth = elements.editorPane.parentElement.offsetWidth; if (newWidth >= 300 && newWidth <= containerWidth - 300) { elements.editorPane.style.flex = 'none'; elements.editorPane.style.width = newWidth + 'px'; } });
            document.addEventListener('mouseup', () => { if (state.isResizing) { state.isResizing = false; elements.resizer.classList.remove('active'); document.body.style.cursor = ''; document.body.style.userSelect = ''; } });
        }

        function initKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'o') { e.preventDefault(); elements.fileInput.click(); }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportJson(); }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'F') { e.preventDefault(); formatJson(); }
            });
        }

        function initEventListeners() {
            elements.jsonEditor.addEventListener('input', () => { clearTimeout(state.debounceTimer); state.debounceTimer = setTimeout(updatePreview, 150); });
            elements.fileInput.addEventListener('change', handleFileSelect);
            elements.jsonEditor.addEventListener('dragover', (e) => e.preventDefault());
            elements.jsonEditor.addEventListener('drop', handleDrop);
            elements.importBtn.addEventListener('click', () => elements.fileInput.click());
            elements.exportBtn.addEventListener('click', exportJson);
            elements.copyBtn.addEventListener('click', copyJson);
            elements.formatBtn.addEventListener('click', formatJson);
            elements.minifyBtn.addEventListener('click', minifyJson);
            elements.clearBtn.addEventListener('click', clearEditor);
            elements.loadDemoBtn.addEventListener('click', loadDemoData);
            elements.expandAllBtn.addEventListener('click', expandAll);
            elements.collapseAllBtn.addEventListener('click', collapseAll);
        }

        document.addEventListener('DOMContentLoaded', () => { initEventListeners(); initResizer(); initKeyboardShortcuts(); updatePreview(); });
    </script>
</body>
</html>
