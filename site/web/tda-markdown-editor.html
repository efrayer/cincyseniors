<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDA Markdown Note Editor</title>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Google Fonts for professional typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* ===========================================
           CSS RESET & ROOT VARIABLES
           =========================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Primary color palette - Professional blue theme */
            --primary-50: #eff6ff;
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-300: #93c5fd;
            --primary-400: #60a5fa;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --primary-800: #1e40af;
            --primary-900: #1e3a8a;

            /* Neutral colors */
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;

            /* Semantic colors */
            --success-500: #22c55e;
            --success-600: #16a34a;
            --danger-500: #ef4444;
            --danger-600: #dc2626;
            --warning-500: #f59e0b;

            /* Editor syntax colors */
            --syntax-heading: #60a5fa;
            --syntax-bold: #f472b6;
            --syntax-italic: #a78bfa;
            --syntax-code: #34d399;
            --syntax-link: #fbbf24;
            --syntax-list: #fb923c;
            --syntax-blockquote: #94a3b8;

            /* Layout */
            --header-height: 60px;
            --sidebar-width: 280px;
            --border-radius: 8px;
            --transition-speed: 0.2s;
        }

        /* ===========================================
           BASE STYLES
           =========================================== */
        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-900);
            color: var(--gray-100);
            line-height: 1.6;
            overflow: hidden;
        }

        /* ===========================================
           APP LAYOUT
           =========================================== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .app-header {
            height: var(--header-height);
            background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-900) 100%);
            border-bottom: 1px solid var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-700) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-200) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* ===========================================
           BUTTONS
           =========================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
            color: white;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-500) 100%);
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--gray-700);
            color: var(--gray-100);
            border: 1px solid var(--gray-600);
        }

        .btn-secondary:hover {
            background: var(--gray-600);
            border-color: var(--gray-500);
        }

        .btn-danger {
            background: var(--danger-500);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-600);
        }

        .btn-icon {
            padding: 10px;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* ===========================================
           MAIN CONTENT AREA
           =========================================== */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar - Notes List */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--gray-800);
            border-right: 1px solid var(--gray-700);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform var(--transition-speed) ease;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--gray-700);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .notes-count {
            font-size: 12px;
            background: var(--gray-700);
            color: var(--gray-300);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .note-item {
            padding: 12px 14px;
            margin-bottom: 4px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            border: 1px solid transparent;
        }

        .note-item:hover {
            background: var(--gray-700);
        }

        .note-item.active {
            background: var(--primary-900);
            border-color: var(--primary-600);
        }

        .note-item-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-100);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item-date {
            font-size: 12px;
            color: var(--gray-500);
        }

        .note-item-preview {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-item-actions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity var(--transition-speed) ease;
        }

        .note-item:hover .note-item-actions {
            opacity: 1;
        }

        .note-action-btn {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }

        .note-action-btn.delete {
            background: var(--danger-500);
            color: white;
        }

        .note-action-btn.delete:hover {
            background: var(--danger-600);
        }

        .note-action-btn.export {
            background: var(--gray-600);
            color: var(--gray-200);
        }

        .note-action-btn.export:hover {
            background: var(--gray-500);
        }

        .empty-notes {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-500);
        }

        .empty-notes svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-notes p {
            font-size: 14px;
        }

        /* ===========================================
           EDITOR AREA
           =========================================== */
        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .pane-header {
            height: 44px;
            background: var(--gray-800);
            border-bottom: 1px solid var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .pane-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pane-title svg {
            width: 16px;
            height: 16px;
        }

        /* Editor Pane */
        .editor-pane {
            border-right: 1px solid var(--gray-700);
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* Syntax highlighted editor using overlay technique */
        .editor-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 20px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            color: var(--gray-300);
            pointer-events: none;
        }

        .markdown-editor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.7;
            background: transparent;
            color: transparent;
            caret-color: var(--primary-400);
            border: none;
            outline: none;
            resize: none;
            overflow-y: auto;
        }

        .markdown-editor::selection {
            background: var(--primary-600);
            color: white;
        }

        /* Preview Pane */
        .preview-pane .pane-content {
            flex: 1;
            overflow-y: auto;
            background: var(--gray-900);
        }

        .preview-content {
            padding: 24px;
            max-width: 100%;
        }

        /* Resizer */
        .resizer {
            width: 4px;
            background: var(--gray-700);
            cursor: col-resize;
            transition: background var(--transition-speed) ease;
            flex-shrink: 0;
        }

        .resizer:hover,
        .resizer.active {
            background: var(--primary-500);
        }

        /* ===========================================
           MARKDOWN PREVIEW STYLES
           =========================================== */
        .preview-content h1,
        .preview-content h2,
        .preview-content h3,
        .preview-content h4,
        .preview-content h5,
        .preview-content h6 {
            color: var(--gray-100);
            font-weight: 600;
            line-height: 1.3;
            margin-top: 24px;
            margin-bottom: 16px;
        }

        .preview-content h1:first-child,
        .preview-content h2:first-child,
        .preview-content h3:first-child {
            margin-top: 0;
        }

        .preview-content h1 {
            font-size: 2em;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--gray-700);
        }

        .preview-content h2 {
            font-size: 1.5em;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--gray-700);
        }

        .preview-content h3 { font-size: 1.25em; }
        .preview-content h4 { font-size: 1em; }
        .preview-content h5 { font-size: 0.875em; }
        .preview-content h6 { font-size: 0.85em; color: var(--gray-400); }

        .preview-content p {
            margin-bottom: 16px;
            color: var(--gray-200);
        }

        .preview-content a {
            color: var(--primary-400);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color var(--transition-speed) ease;
        }

        .preview-content a:hover {
            border-bottom-color: var(--primary-400);
        }

        .preview-content strong {
            color: var(--gray-100);
            font-weight: 600;
        }

        .preview-content em {
            font-style: italic;
        }

        .preview-content code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.9em;
            background: var(--gray-800);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--syntax-code);
        }

        .preview-content pre {
            margin: 16px 0;
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        .preview-content pre code {
            display: block;
            padding: 16px;
            overflow-x: auto;
            background: var(--gray-800);
            color: var(--gray-200);
            font-size: 13px;
            line-height: 1.6;
        }

        .preview-content blockquote {
            margin: 16px 0;
            padding: 12px 20px;
            border-left: 4px solid var(--primary-500);
            background: var(--gray-800);
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            color: var(--gray-300);
        }

        .preview-content blockquote p:last-child {
            margin-bottom: 0;
        }

        .preview-content ul,
        .preview-content ol {
            margin: 16px 0;
            padding-left: 24px;
            color: var(--gray-200);
        }

        .preview-content li {
            margin-bottom: 8px;
        }

        .preview-content li::marker {
            color: var(--primary-400);
        }

        .preview-content hr {
            margin: 24px 0;
            border: none;
            height: 1px;
            background: var(--gray-700);
        }

        .preview-content table {
            width: 100%;
            margin: 16px 0;
            border-collapse: collapse;
            font-size: 14px;
        }

        .preview-content th,
        .preview-content td {
            padding: 12px;
            text-align: left;
            border: 1px solid var(--gray-700);
        }

        .preview-content th {
            background: var(--gray-800);
            font-weight: 600;
            color: var(--gray-100);
        }

        .preview-content td {
            color: var(--gray-300);
        }

        .preview-content img {
            max-width: 100%;
            border-radius: var(--border-radius);
            margin: 16px 0;
        }

        .preview-content input[type="checkbox"] {
            margin-right: 8px;
            accent-color: var(--primary-500);
        }

        /* ===========================================
           SYNTAX HIGHLIGHTING FOR EDITOR
           =========================================== */
        .syntax-heading { color: var(--syntax-heading); font-weight: 600; }
        .syntax-bold { color: var(--syntax-bold); font-weight: 600; }
        .syntax-italic { color: var(--syntax-italic); font-style: italic; }
        .syntax-code { color: var(--syntax-code); background: rgba(52, 211, 153, 0.1); border-radius: 3px; }
        .syntax-link { color: var(--syntax-link); }
        .syntax-url { color: var(--gray-500); }
        .syntax-list { color: var(--syntax-list); }
        .syntax-blockquote { color: var(--syntax-blockquote); }
        .syntax-hr { color: var(--gray-500); }
        .syntax-image { color: var(--primary-400); }

        /* ===========================================
           MODAL STYLES
           =========================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-speed) ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--gray-800);
            border-radius: 12px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transform: scale(0.95);
            transition: transform var(--transition-speed) ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-700);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-100);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-300);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            font-family: inherit;
            background: var(--gray-900);
            border: 1px solid var(--gray-600);
            border-radius: var(--border-radius);
            color: var(--gray-100);
            transition: border-color var(--transition-speed) ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--gray-700);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ===========================================
           TOAST NOTIFICATIONS
           =========================================== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--gray-800);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--gray-700);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 360px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { color: var(--success-500); }
        .toast.error .toast-icon { color: var(--danger-500); }
        .toast.warning .toast-icon { color: var(--warning-500); }
        .toast.info .toast-icon { color: var(--primary-400); }

        .toast-message {
            font-size: 14px;
            color: var(--gray-200);
        }

        /* ===========================================
           MOBILE RESPONSIVE STYLES
           =========================================== */
        .mobile-menu-btn {
            display: none;
            padding: 8px;
            background: transparent;
            border: none;
            color: var(--gray-300);
            cursor: pointer;
        }

        .mobile-menu-btn svg {
            width: 24px;
            height: 24px;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: var(--header-height);
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                position: fixed;
                top: var(--header-height);
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 40;
                opacity: 0;
                visibility: hidden;
                transition: all var(--transition-speed) ease;
            }

            .sidebar-overlay.active {
                opacity: 1;
                visibility: visible;
            }

            .mobile-menu-btn {
                display: block;
            }

            .header-actions .btn-text {
                display: none;
            }

            .header-actions .btn {
                padding: 10px;
            }
        }

        @media (max-width: 768px) {
            .editor-container {
                flex-direction: column;
            }

            .resizer {
                display: none;
            }

            .pane {
                min-height: 40vh;
            }

            .editor-pane {
                border-right: none;
                border-bottom: 1px solid var(--gray-700);
            }
        }

        /* ===========================================
           SCROLLBAR STYLES
           =========================================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-800);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-600);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-500);
        }

        /* ===========================================
           UTILITY CLASSES
           =========================================== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>
    <!-- =========================================
         APPLICATION CONTAINER
         ========================================= -->
    <div class="app-container">
        
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle sidebar">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div class="logo-icon">M</div>
                <span class="logo-text">TDA Markdown Editor</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" id="importNoteBtn" title="Import .md file">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    <span class="btn-text">Import</span>
                </button>
                <input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display: none;">
                <button class="btn btn-secondary" id="newNoteBtn" title="New Note">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span class="btn-text">New Note</span>
                </button>
                <button class="btn btn-primary" id="saveNoteBtn" title="Save Note">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    <span class="btn-text">Save</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Sidebar Overlay for Mobile -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            
            <!-- Sidebar - Notes List -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Saved Notes</span>
                    <span class="notes-count" id="notesCount">0</span>
                </div>
                <div class="notes-list" id="notesList">
                    <!-- Notes will be rendered here -->
                </div>
            </aside>

            <!-- Editor Container -->
            <div class="editor-container">
                
                <!-- Editor Pane -->
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-header">
                        <span class="pane-title">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                            Editor
                        </span>
                        <span id="charCount" style="font-size: 12px; color: var(--gray-500);">0 chars</span>
                    </div>
                    <div class="editor-wrapper">
                        <div class="editor-backdrop" id="editorBackdrop" aria-hidden="true"></div>
                        <textarea 
                            class="markdown-editor" 
                            id="markdownEditor" 
                            placeholder="Start writing your markdown here..."
                            spellcheck="true"
                        ></textarea>
                    </div>
                </div>

                <!-- Resizer -->
                <div class="resizer" id="resizer"></div>

                <!-- Preview Pane -->
                <div class="pane preview-pane">
                    <div class="pane-header">
                        <span class="pane-title">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            Preview
                        </span>
                    </div>
                    <div class="pane-content">
                        <div class="preview-content" id="previewContent">
                            <p style="color: var(--gray-500); font-style: italic;">Your rendered markdown will appear here...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Save Note Modal -->
    <div class="modal-overlay" id="saveModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Save Note</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="noteTitle">Note Title</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="noteTitle" 
                        placeholder="Enter a title for your note..."
                        autocomplete="off"
                    >
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelSaveBtn">Cancel</button>
                <button class="btn btn-primary" id="confirmSaveBtn">Save Note</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- =========================================
         JAVASCRIPT
         ========================================= -->
    <script>
        /**
         * TDA Markdown Note Editor
         * A complete markdown editing application with real-time preview,
         * syntax highlighting, and local storage persistence.
         * 
         * Author: TDA (Think Data Analysis)
         * Version: 1.0.0
         */

        // ===========================================
        // CONFIGURATION & INITIALIZATION
        // ===========================================

        /**
         * Configure marked.js options for markdown parsing
         */
        marked.setOptions({
            breaks: true,           // Enable line breaks with single newline
            gfm: true,              // Enable GitHub Flavored Markdown
            headerIds: true,        // Generate IDs for headings
            highlight: function(code, lang) {
                // Apply syntax highlighting to code blocks
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {
                        console.error('Highlight error:', err);
                    }
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // ===========================================
        // DOM ELEMENT REFERENCES
        // ===========================================
        
        const elements = {
            // Editor elements
            editor: document.getElementById('markdownEditor'),
            backdrop: document.getElementById('editorBackdrop'),
            preview: document.getElementById('previewContent'),
            charCount: document.getElementById('charCount'),
            
            // Sidebar elements
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            notesList: document.getElementById('notesList'),
            notesCount: document.getElementById('notesCount'),
            
            // Buttons
            newNoteBtn: document.getElementById('newNoteBtn'),
            saveNoteBtn: document.getElementById('saveNoteBtn'),
            importNoteBtn: document.getElementById('importNoteBtn'),
            fileInput: document.getElementById('fileInput'),
            mobileMenuBtn: document.getElementById('mobileMenuBtn'),
            
            // Modal elements
            saveModal: document.getElementById('saveModal'),
            noteTitle: document.getElementById('noteTitle'),
            cancelSaveBtn: document.getElementById('cancelSaveBtn'),
            confirmSaveBtn: document.getElementById('confirmSaveBtn'),
            
            // Resizer
            resizer: document.getElementById('resizer'),
            editorPane: document.getElementById('editorPane'),
            
            // Toast container
            toastContainer: document.getElementById('toastContainer')
        };

        // ===========================================
        // APPLICATION STATE
        // ===========================================
        
        const state = {
            currentNoteId: null,    // ID of currently loaded note
            isResizing: false,      // Flag for pane resizing
            notes: []               // Array of all saved notes
        };

        // ===========================================
        // LOCAL STORAGE FUNCTIONS
        // ===========================================

        /**
         * Storage key for notes in localStorage
         */
        const STORAGE_KEY = 'tda_markdown_notes';

        /**
         * Load all notes from localStorage
         * @returns {Array} Array of note objects
         */
        function loadNotesFromStorage() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (error) {
                console.error('Error loading notes:', error);
                showToast('Error loading notes from storage', 'error');
                return [];
            }
        }

        /**
         * Save all notes to localStorage
         * @param {Array} notes - Array of note objects to save
         */
        function saveNotesToStorage(notes) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            } catch (error) {
                console.error('Error saving notes:', error);
                showToast('Error saving notes to storage', 'error');
            }
        }

        // ===========================================
        // NOTE MANAGEMENT FUNCTIONS
        // ===========================================

        /**
         * Generate a unique ID for a new note
         * @returns {string} Unique note ID
         */
        function generateNoteId() {
            return 'note_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        /**
         * Format a timestamp to a readable date string
         * @param {number} timestamp - Unix timestamp
         * @returns {string} Formatted date string
         */
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            // Show relative time for recent notes
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} min ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} hours ago`;
            
            // Show full date for older notes
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
            });
        }

        /**
         * Extract a preview snippet from markdown content
         * @param {string} content - Markdown content
         * @param {number} maxLength - Maximum preview length
         * @returns {string} Preview text
         */
        function extractPreview(content, maxLength = 80) {
            // Remove markdown syntax for cleaner preview
            const cleaned = content
                .replace(/#{1,6}\s/g, '')           // Headers
                .replace(/\*\*|__/g, '')            // Bold
                .replace(/\*|_/g, '')               // Italic
                .replace(/`{1,3}[^`]*`{1,3}/g, '')  // Code
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')  // Links
                .replace(/!\[([^\]]*)\]\([^)]+\)/g, '')   // Images
                .replace(/\n+/g, ' ')               // Newlines
                .trim();
            
            return cleaned.length > maxLength 
                ? cleaned.substring(0, maxLength) + '...' 
                : cleaned || 'Empty note';
        }

        /**
         * Save the current note
         * @param {string} title - Note title
         */
        function saveNote(title) {
            const content = elements.editor.value;
            
            if (!content.trim()) {
                showToast('Cannot save an empty note', 'warning');
                return;
            }

            const now = Date.now();
            
            if (state.currentNoteId) {
                // Update existing note
                const noteIndex = state.notes.findIndex(n => n.id === state.currentNoteId);
                if (noteIndex !== -1) {
                    state.notes[noteIndex] = {
                        ...state.notes[noteIndex],
                        title: title || state.notes[noteIndex].title,
                        content: content,
                        updatedAt: now
                    };
                    showToast('Note updated successfully', 'success');
                }
            } else {
                // Create new note
                const newNote = {
                    id: generateNoteId(),
                    title: title || 'Untitled Note',
                    content: content,
                    createdAt: now,
                    updatedAt: now
                };
                state.notes.unshift(newNote);
                state.currentNoteId = newNote.id;
                showToast('Note saved successfully', 'success');
            }

            saveNotesToStorage(state.notes);
            renderNotesList();
        }

        /**
         * Load a note into the editor
         * @param {string} noteId - ID of note to load
         */
        function loadNote(noteId) {
            const note = state.notes.find(n => n.id === noteId);
            if (note) {
                elements.editor.value = note.content;
                state.currentNoteId = noteId;
                updatePreview();
                updateSyntaxHighlight();
                updateCharCount();
                renderNotesList();
                closeSidebar();
                showToast(`Loaded: ${note.title}`, 'info');
            }
        }

        /**
         * Delete a note
         * @param {string} noteId - ID of note to delete
         */
        function deleteNote(noteId) {
            const note = state.notes.find(n => n.id === noteId);
            if (!note) return;

            if (confirm(`Are you sure you want to delete "${note.title}"?`)) {
                state.notes = state.notes.filter(n => n.id !== noteId);
                saveNotesToStorage(state.notes);
                
                if (state.currentNoteId === noteId) {
                    elements.editor.value = '';
                    state.currentNoteId = null;
                    updatePreview();
                    updateSyntaxHighlight();
                    updateCharCount();
                }
                
                renderNotesList();
                showToast('Note deleted', 'success');
            }
        }

        /**
         * Export a note as a .md file
         * @param {string} noteId - ID of note to export
         */
        function exportNote(noteId) {
            const note = state.notes.find(n => n.id === noteId);
            if (!note) return;

            const blob = new Blob([note.content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${note.title.replace(/[^a-z0-9]/gi, '_')}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Note exported', 'success');
        }

        /**
         * Import a markdown file as a new note
         * @param {File} file - The file to import
         */
        function importNote(file) {
            // Validate file type
            const validTypes = ['.md', '.markdown', '.txt'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validTypes.includes(fileExtension) && !file.type.includes('text')) {
                showToast('Please select a valid markdown or text file', 'error');
                return;
            }

            // Check file size (limit to 1MB for safety)
            const maxSize = 1024 * 1024; // 1MB
            if (file.size > maxSize) {
                showToast('File is too large. Maximum size is 1MB.', 'error');
                return;
            }

            const reader = new FileReader();
            
            reader.onload = function(e) {
                const content = e.target.result;
                
                // Extract title from filename (remove extension)
                const title = file.name.replace(/\.(md|markdown|txt)$/i, '');
                
                // Create new note with imported content
                const now = Date.now();
                const newNote = {
                    id: generateNoteId(),
                    title: title || 'Imported Note',
                    content: content,
                    createdAt: now,
                    updatedAt: now
                };
                
                state.notes.unshift(newNote);
                state.currentNoteId = newNote.id;
                saveNotesToStorage(state.notes);
                
                // Load the imported note into editor
                elements.editor.value = content;
                updatePreview();
                updateSyntaxHighlight();
                updateCharCount();
                renderNotesList();
                
                showToast(`Imported: ${title}`, 'success');
            };
            
            reader.onerror = function() {
                showToast('Error reading file', 'error');
            };
            
            reader.readAsText(file);
        }

        /**
         * Handle file input change (triggered when user selects a file)
         */
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                importNote(file);
            }
            // Reset input so the same file can be imported again if needed
            event.target.value = '';
        }

        /**
         * Create a new empty note
         */
        function createNewNote() {
            if (elements.editor.value.trim() && !state.currentNoteId) {
                if (!confirm('You have unsaved changes. Create new note anyway?')) {
                    return;
                }
            }
            
            elements.editor.value = '';
            state.currentNoteId = null;
            updatePreview();
            updateSyntaxHighlight();
            updateCharCount();
            renderNotesList();
            elements.editor.focus();
            showToast('New note created', 'info');
        }

        // ===========================================
        // UI RENDERING FUNCTIONS
        // ===========================================

        /**
         * Render the list of saved notes in the sidebar
         */
        function renderNotesList() {
            elements.notesCount.textContent = state.notes.length;

            if (state.notes.length === 0) {
                elements.notesList.innerHTML = `
                    <div class="empty-notes">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <p>No saved notes yet</p>
                        <p style="font-size: 12px; margin-top: 4px;">Click "Save" to save your first note</p>
                    </div>
                `;
                return;
            }

            elements.notesList.innerHTML = state.notes.map(note => `
                <div class="note-item ${note.id === state.currentNoteId ? 'active' : ''}" 
                     data-id="${note.id}">
                    <div class="note-item-title">${escapeHtml(note.title)}</div>
                    <div class="note-item-date">${formatDate(note.updatedAt)}</div>
                    <div class="note-item-preview">${escapeHtml(extractPreview(note.content))}</div>
                    <div class="note-item-actions">
                        <button class="note-action-btn export" data-action="export" data-id="${note.id}">
                            Export
                        </button>
                        <button class="note-action-btn delete" data-action="delete" data-id="${note.id}">
                            Delete
                        </button>
                    </div>
                </div>
            `).join('');

            // Attach event listeners to note items
            elements.notesList.querySelectorAll('.note-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    // Ignore clicks on action buttons
                    if (e.target.closest('.note-action-btn')) return;
                    loadNote(item.dataset.id);
                });
            });

            // Attach event listeners to action buttons
            elements.notesList.querySelectorAll('.note-action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    const id = btn.dataset.id;
                    
                    if (action === 'delete') deleteNote(id);
                    else if (action === 'export') exportNote(id);
                });
            });
        }

        /**
         * Update the markdown preview
         */
        function updatePreview() {
            const content = elements.editor.value;
            
            if (!content.trim()) {
                elements.preview.innerHTML = '<p style="color: var(--gray-500); font-style: italic;">Your rendered markdown will appear here...</p>';
                return;
            }

            try {
                elements.preview.innerHTML = marked.parse(content);
                // Re-apply syntax highlighting to any code blocks
                elements.preview.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            } catch (error) {
                console.error('Markdown parsing error:', error);
                elements.preview.innerHTML = '<p style="color: var(--danger-500);">Error rendering markdown</p>';
            }
        }

        /**
         * Apply syntax highlighting to the editor backdrop
         * This creates the visual effect of syntax highlighting while typing
         */
        function updateSyntaxHighlight() {
            const content = elements.editor.value;
            
            // Escape HTML entities first
            let highlighted = escapeHtml(content);
            
            // Apply syntax highlighting patterns
            // Order matters: apply more specific patterns before general ones
            
            // Code blocks (fenced)
            highlighted = highlighted.replace(
                /(```[\s\S]*?```)/g,
                '<span class="syntax-code">$1</span>'
            );
            
            // Inline code
            highlighted = highlighted.replace(
                /(`[^`\n]+`)/g,
                '<span class="syntax-code">$1</span>'
            );
            
            // Headers
            highlighted = highlighted.replace(
                /^(#{1,6}\s.*)$/gm,
                '<span class="syntax-heading">$1</span>'
            );
            
            // Bold
            highlighted = highlighted.replace(
                /(\*\*[^*]+\*\*|__[^_]+__)/g,
                '<span class="syntax-bold">$1</span>'
            );
            
            // Italic (careful not to match bold markers)
            highlighted = highlighted.replace(
                /(?<!\*)(\*[^*\n]+\*)(?!\*)|(?<!_)(_[^_\n]+_)(?!_)/g,
                '<span class="syntax-italic">$1$2</span>'
            );
            
            // Links
            highlighted = highlighted.replace(
                /(\[[^\]]+\])(\([^)]+\))/g,
                '<span class="syntax-link">$1</span><span class="syntax-url">$2</span>'
            );
            
            // Images
            highlighted = highlighted.replace(
                /(!\[[^\]]*\]\([^)]+\))/g,
                '<span class="syntax-image">$1</span>'
            );
            
            // Lists
            highlighted = highlighted.replace(
                /^(\s*[-*+]\s)/gm,
                '<span class="syntax-list">$1</span>'
            );
            
            // Numbered lists
            highlighted = highlighted.replace(
                /^(\s*\d+\.\s)/gm,
                '<span class="syntax-list">$1</span>'
            );
            
            // Blockquotes
            highlighted = highlighted.replace(
                /^(&gt;\s?.*)$/gm,
                '<span class="syntax-blockquote">$1</span>'
            );
            
            // Horizontal rules
            highlighted = highlighted.replace(
                /^([-*_]{3,})$/gm,
                '<span class="syntax-hr">$1</span>'
            );

            // Add trailing newline to ensure proper rendering
            elements.backdrop.innerHTML = highlighted + '\n';
        }

        /**
         * Update character count display
         */
        function updateCharCount() {
            const count = elements.editor.value.length;
            elements.charCount.textContent = `${count.toLocaleString()} chars`;
        }

        /**
         * Escape HTML entities to prevent XSS
         * @param {string} text - Text to escape
         * @returns {string} Escaped text
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===========================================
        // TOAST NOTIFICATION SYSTEM
        // ===========================================

        /**
         * Show a toast notification
         * @param {string} message - Message to display
         * @param {string} type - Toast type: 'success', 'error', 'warning', 'info'
         * @param {number} duration - Display duration in milliseconds
         */
        function showToast(message, type = 'info', duration = 3000) {
            const icons = {
                success: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
                error: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
                warning: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>',
                info: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
            };

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <span class="toast-message">${escapeHtml(message)}</span>
            `;

            elements.toastContainer.appendChild(toast);

            // Trigger animation
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            // Remove toast after duration
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ===========================================
        // MODAL FUNCTIONS
        // ===========================================

        /**
         * Open the save modal
         */
        function openSaveModal() {
            if (!elements.editor.value.trim()) {
                showToast('Nothing to save - write something first!', 'warning');
                return;
            }

            // Pre-fill title if editing existing note
            const currentNote = state.notes.find(n => n.id === state.currentNoteId);
            elements.noteTitle.value = currentNote ? currentNote.title : '';
            
            elements.saveModal.classList.add('active');
            elements.noteTitle.focus();
        }

        /**
         * Close the save modal
         */
        function closeSaveModal() {
            elements.saveModal.classList.remove('active');
            elements.noteTitle.value = '';
        }

        // ===========================================
        // SIDEBAR FUNCTIONS (MOBILE)
        // ===========================================

        /**
         * Toggle sidebar visibility (mobile)
         */
        function toggleSidebar() {
            elements.sidebar.classList.toggle('open');
            elements.sidebarOverlay.classList.toggle('active');
        }

        /**
         * Close sidebar (mobile)
         */
        function closeSidebar() {
            elements.sidebar.classList.remove('open');
            elements.sidebarOverlay.classList.remove('active');
        }

        // ===========================================
        // PANE RESIZER FUNCTIONALITY
        // ===========================================

        /**
         * Initialize the pane resizer for split-pane layout
         */
        function initResizer() {
            let startX, startWidth;

            elements.resizer.addEventListener('mousedown', (e) => {
                state.isResizing = true;
                startX = e.clientX;
                startWidth = elements.editorPane.offsetWidth;
                elements.resizer.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!state.isResizing) return;
                
                const diff = e.clientX - startX;
                const newWidth = startWidth + diff;
                const containerWidth = elements.editorPane.parentElement.offsetWidth;
                
                // Enforce minimum and maximum widths
                const minWidth = 300;
                const maxWidth = containerWidth - 300;
                
                if (newWidth >= minWidth && newWidth <= maxWidth) {
                    elements.editorPane.style.flex = 'none';
                    elements.editorPane.style.width = newWidth + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                if (state.isResizing) {
                    state.isResizing = false;
                    elements.resizer.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        // ===========================================
        // SYNC SCROLL POSITIONS
        // ===========================================

        /**
         * Synchronize scroll positions between editor and backdrop
         */
        function syncScroll() {
            elements.backdrop.scrollTop = elements.editor.scrollTop;
            elements.backdrop.scrollLeft = elements.editor.scrollLeft;
        }

        // ===========================================
        // KEYBOARD SHORTCUTS
        // ===========================================

        /**
         * Initialize keyboard shortcuts
         */
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + S: Save note
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    openSaveModal();
                }
                
                // Ctrl/Cmd + N: New note
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    createNewNote();
                }
                
                // Ctrl/Cmd + O: Import/Open file
                if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                    e.preventDefault();
                    elements.fileInput.click();
                }
                
                // Escape: Close modal
                if (e.key === 'Escape') {
                    if (elements.saveModal.classList.contains('active')) {
                        closeSaveModal();
                    }
                    if (elements.sidebar.classList.contains('open')) {
                        closeSidebar();
                    }
                }
            });

            // Enter in modal to save
            elements.noteTitle.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSaveConfirm();
                }
            });
        }

        /**
         * Handle save confirmation from modal
         */
        function handleSaveConfirm() {
            const title = elements.noteTitle.value.trim() || 'Untitled Note';
            saveNote(title);
            closeSaveModal();
        }

        // ===========================================
        // EVENT LISTENERS
        // ===========================================

        /**
         * Initialize all event listeners
         */
        function initEventListeners() {
            // Editor input - update preview and highlighting in real-time
            elements.editor.addEventListener('input', () => {
                updatePreview();
                updateSyntaxHighlight();
                updateCharCount();
            });

            // Sync scroll positions
            elements.editor.addEventListener('scroll', syncScroll);

            // Button clicks
            elements.newNoteBtn.addEventListener('click', createNewNote);
            elements.saveNoteBtn.addEventListener('click', openSaveModal);
            elements.importNoteBtn.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', handleFileSelect);
            elements.mobileMenuBtn.addEventListener('click', toggleSidebar);
            elements.sidebarOverlay.addEventListener('click', closeSidebar);
            
            // Modal buttons
            elements.cancelSaveBtn.addEventListener('click', closeSaveModal);
            elements.confirmSaveBtn.addEventListener('click', handleSaveConfirm);
            
            // Close modal on overlay click
            elements.saveModal.addEventListener('click', (e) => {
                if (e.target === elements.saveModal) {
                    closeSaveModal();
                }
            });
        }

        // ===========================================
        // APPLICATION INITIALIZATION
        // ===========================================

        /**
         * Initialize the application
         */
        function init() {
            // Load notes from storage
            state.notes = loadNotesFromStorage();
            
            // Render initial UI
            renderNotesList();
            updatePreview();
            updateSyntaxHighlight();
            updateCharCount();
            
            // Initialize functionality
            initEventListeners();
            initResizer();
            initKeyboardShortcuts();
            
            // Set default content for demo
            if (state.notes.length === 0) {
                elements.editor.value = `# Welcome to TDA Markdown Editor! 🚀

This is a **full-featured** markdown editor with *live preview* and syntax highlighting.

## Features

- Real-time markdown preview
- Syntax highlighting in the editor
- Save notes to local storage
- Import .md files from your computer
- Export notes as .md files
- Responsive design

## Code Example

\`\`\`javascript
function greet(name) {
    console.log(\`Hello, \${name}!\`);
}

greet('World');
\`\`\`

## Keyboard Shortcuts

| Shortcut | Action |
|----------|--------|
| Ctrl+S | Save note |
| Ctrl+N | New note |
| Ctrl+O | Import file |
| Escape | Close dialogs |

> **Tip:** You can drag the divider between the editor and preview to resize the panes!

### Try These:

1. Write some markdown
2. See it render in real-time
3. Save it for later
4. Import existing .md files
5. Export when ready

---

*Happy writing!* ✨`;
                updatePreview();
                updateSyntaxHighlight();
                updateCharCount();
            }
            
            // Focus editor
            elements.editor.focus();
        }

        // Start the application when DOM is ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
