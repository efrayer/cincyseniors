<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Playing to Win">
<meta name="theme-color" content="#0f1117">
<title>Playing to Win — Eric's Audiobooks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --surface2: #1f2436;
    --border:   rgba(255,255,255,0.07);
    --amber:    #e8a246;
    --amber-dim:#a06420;
    --text:     #e8e4da;
    --muted:    #7a7a8a;
    --danger:   #c0392b;
    --radius:   14px;
    --player-h: 200px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,162,70,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(100,80,200,0.05) 0%, transparent 60%);
  }

  /* ── Header ── */
  header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 36px; height: 36px;
    background: var(--amber);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 20px; height: 20px; fill: #0f1117; }
  .site-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .back-link {
    margin-left: auto;
    font-size: 12px;
    color: var(--amber);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .back-link:hover { opacity: 1; }
  .back-link svg { width: 14px; height: 14px; }

  /* ── Book hero ── */
  .book-hero {
    padding: 28px 20px 20px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .cover-art {
    width: 96px; height: 96px;
    border-radius: 10px;
    background: linear-gradient(135deg, #0e1f2a 0%, #103050 40%, #1a2840 100%);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(232,162,70,0.2);
    position: relative;
    overflow: hidden;
  }
  .cover-art::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 3px,
      rgba(232,162,70,0.03) 3px,
      rgba(232,162,70,0.03) 4px
    );
  }
  .cover-art svg { width: 40px; height: 40px; fill: var(--amber); opacity: 0.8; position: relative; }
  .book-meta { flex: 1; min-width: 0; }
  .book-label {
    font-size: 11px; font-weight: 500;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .book-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 8px;
  }
  .book-author {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .progress-bar-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label { font-size: 11px; color: var(--muted); }

  /* ── Now playing ── */
  .now-playing-card {
    margin: 0 12px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .now-playing-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber-dim), transparent);
    opacity: 0.6;
  }
  .np-label {
    font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--amber);
    margin-bottom: 6px;
  }
  .np-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 500;
    font-style: italic;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 14px;
  }

  /* Seek bar */
  .seek-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .time-label { font-size: 11px; color: var(--muted); min-width: 36px; }
  .time-label.right { text-align: right; }
  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 3px;
    border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--amber);
    margin-top: -5.5px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type=range]:active::-webkit-slider-thumb { transform: scale(1.3); }
  #seek-bar { background: linear-gradient(to right, var(--amber) 0%, var(--surface2) 0%); }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:hover { background: var(--surface2); }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn svg { width: 22px; height: 22px; }
  .ctrl-btn.small svg { width: 18px; height: 18px; }
  .ctrl-btn.muted { color: var(--muted); }
  .play-btn {
    width: 52px; height: 52px;
    background: var(--amber);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .play-btn:hover { background: #f0b050; }
  .play-btn:active { transform: scale(0.93); }
  .play-btn svg { width: 22px; height: 22px; fill: #0f1117; }

  /* Speed control */
  .speed-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .speed-btn:hover { background: rgba(232,162,70,0.15); }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }
  .volume-icon { color: var(--muted); }
  .volume-icon svg { width: 16px; height: 16px; }

  /* ── Chapter list ── */
  .section-header {
    padding: 4px 20px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .chapter-count {
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .chapter-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 220px;
    -webkit-overflow-scrolling: touch;
  }
  .chapter-list::-webkit-scrollbar { width: 0; }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .chapter-item:hover { background: var(--surface); }
  .chapter-item.active {
    background: var(--surface);
    border: 1px solid rgba(232,162,70,0.2);
  }
  .chapter-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 2px;
    background: var(--amber);
    border-radius: 0 2px 2px 0;
  }
  .ch-num {
    font-size: 12px;
    color: var(--muted);
    min-width: 24px;
    text-align: center;
    font-feature-settings: 'tnum';
  }
  .chapter-item.active .ch-num { color: var(--amber); }
  .ch-playing-icon {
    display: none;
    color: var(--amber);
  }
  .ch-playing-icon svg { width: 14px; height: 14px; }
  .chapter-item.active.is-playing .ch-num { display: none; }
  .chapter-item.active.is-playing .ch-playing-icon { display: flex; align-items: center; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .chapter-item.active .ch-title { font-weight: 500; }
  .ch-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .ch-done {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .ch-done.complete {
    background: rgba(232,162,70,0.15);
    border-color: var(--amber);
  }
  .ch-done.complete svg { display: block; }
  .ch-done svg { display: none; width: 10px; height: 10px; fill: var(--amber); }

  /* ── Offline banner ── */
  .offline-banner {
    display: none;
    margin: 0 12px 8px;
    padding: 10px 14px;
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 8px;
    font-size: 12px;
    color: #e07070;
    text-align: center;
  }
  .offline-banner.show { display: block; }

  /* Animated bars (playing indicator) */
  @keyframes bar1 { 0%,100%{height:4px} 50%{height:12px} }
  @keyframes bar2 { 0%,100%{height:10px} 33%{height:4px} 66%{height:14px} }
  @keyframes bar3 { 0%,100%{height:6px} 25%{height:14px} 75%{height:4px} }
  .bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
  .bars span {
    width: 3px; background: var(--amber); border-radius: 1px;
    animation: bar1 0.9s ease-in-out infinite;
  }
  .bars span:nth-child(2) { animation-name: bar2; animation-delay: 0.15s; }
  .bars span:nth-child(3) { animation-name: bar3; animation-delay: 0.3s; }
  .bars.paused span { animation-play-state: paused; }

  /* Fade-in animation */
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .chapter-item { animation: fadeUp 0.25s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5zM2 16l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <span class="site-name">Eric's Audiobooks</span>
  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Library
  </a>
</header>

<div class="book-hero">
  <div class="cover-art">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm-2-5l6-3.5L10 8v7z"/></svg>
  </div>
  <div class="book-meta">
    <div class="book-label">Now Reading</div>
    <div class="book-title">Playing to Win</div>
    <div class="book-author">Michael Lewis · Narrated by Michael Lewis</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="overall-progress"></div></div>
    <div class="progress-label" id="progress-label">0 of 8 chapters</div>
  </div>
</div>

<div class="offline-banner" id="offline-banner">You're offline — only cached chapters will play.</div>

<!-- Now Playing Card -->
<div class="now-playing-card">
  <div class="np-label">Now Playing</div>
  <div class="np-title" id="np-title">Select a chapter to begin</div>

  <div class="seek-wrap">
    <span class="time-label" id="time-current">0:00</span>
    <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
    <span class="time-label right" id="time-total">0:00</span>
  </div>

  <div class="controls">
    <button class="ctrl-btn small muted" id="btn-prev" title="Previous chapter" aria-label="Previous chapter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-back" title="Back 15s" aria-label="Rewind 15 seconds">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2.5 2v6h6M2.66 15.57a10 10 0 1 0 .57-8.38"/>
        <text x="8" y="16" font-size="5" fill="currentColor" stroke="none" font-family="DM Sans,sans-serif">15</text>
      </svg>
    </button>
    <button class="play-btn" id="btn-play" aria-label="Play / Pause">
      <svg id="icon-play" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-fwd" title="Forward 15s" aria-label="Forward 15 seconds">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/>
        <text x="8" y="16" font-size="5" fill="currentColor" stroke="none" font-family="DM Sans,sans-serif">15</text>
      </svg>
    </button>
    <button class="ctrl-btn small muted" id="btn-next" title="Next chapter" aria-label="Next chapter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;">
    <div class="volume-row" style="flex:1;margin-top:0;">
      <div class="volume-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </div>
      <input type="range" id="volume-bar" min="0" max="1" value="1" step="0.01" style="flex:1;">
    </div>
    <button class="speed-btn" id="btn-speed">1.0×</button>
  </div>
</div>

<div class="section-header">
  <span>Chapters</span>
  <span class="chapter-count" id="chapter-count">8 tracks</span>
</div>

<div class="chapter-list" id="chapter-list"></div>

<audio id="audio" preload="metadata"></audio>

<script>
const BOOK_ID = 'ptw';
const SPEEDS = [0.75, 1.0, 1.25, 1.5, 1.75, 2.0];

const BASE = 'https://thinkdataanalysis.blob.core.windows.net/files/audiobooks/Playing_to_Win/Playing%20to%20Win%20-';

const CHAPTERS = [
  {id:"ptw_ch1", title:"Chapter 1", url: BASE + "%200001%20-%20Chapter%201.mp3"},
  {id:"ptw_ch2", title:"Chapter 2", url: BASE + "%200002%20-%20Chapter%202.mp3"},
  {id:"ptw_ch3", title:"Chapter 3", url: BASE + "%200003%20-%20Chapter%203.mp3"},
  {id:"ptw_ch4", title:"Chapter 4", url: BASE + "%200004%20-%20Chapter%204.mp3"},
  {id:"ptw_ch5", title:"Chapter 5", url: BASE + "%200005%20-%20Chapter%205.mp3"},
  {id:"ptw_ch6", title:"Chapter 6", url: BASE + "%200006%20-%20Chapter%206.mp3"},
  {id:"ptw_ch7", title:"Chapter 7", url: BASE + "%200007%20-%20Chapter%207.mp3"},
  {id:"ptw_ch8", title:"Chapter 8", url: BASE + "%200008%20-%20Chapter%208.mp3"}
];

// ── State ──────────────────────────────────────────────
let state = {
  currentIdx: 0,
  isPlaying: false,
  speedIdx: 1,
  completed: {},
  positions: {}
};

function saveState() {
  try { localStorage.setItem(BOOK_ID + '_state', JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(BOOK_ID + '_state') || 'null');
    if (s) state = {...state, ...s};
  } catch(e){}
}

// ── DOM refs ────────────────────────────────────────────
const audio       = document.getElementById('audio');
const btnPlay     = document.getElementById('btn-play');
const iconPlay    = document.getElementById('icon-play');
const iconPause   = document.getElementById('icon-pause');
const btnPrev     = document.getElementById('btn-prev');
const btnNext     = document.getElementById('btn-next');
const btnBack     = document.getElementById('btn-back');
const btnFwd      = document.getElementById('btn-fwd');
const btnSpeed    = document.getElementById('btn-speed');
const seekBar     = document.getElementById('seek-bar');
const volumeBar   = document.getElementById('volume-bar');
const npTitle     = document.getElementById('np-title');
const timeCurrent = document.getElementById('time-current');
const timeTotal   = document.getElementById('time-total');
const chapterList = document.getElementById('chapter-list');
const overallProg = document.getElementById('overall-progress');
const progressLbl = document.getElementById('progress-label');
const offlineBanner = document.getElementById('offline-banner');

// ── Helpers ─────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function updateSeekGradient(pct) {
  seekBar.style.background = `linear-gradient(to right, var(--amber) ${pct}%, var(--surface2) ${pct}%)`;
}

// ── Render chapter list ─────────────────────────────────
function renderList() {
  chapterList.innerHTML = '';
  CHAPTERS.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-item' + (i === state.currentIdx ? ' active' : '');
    if (i === state.currentIdx && state.isPlaying) item.classList.add('is-playing');
    item.style.animationDelay = (i * 18) + 'ms';

    const done = !!state.completed[ch.id];

    item.innerHTML = `
      <div class="ch-num">${i + 1}</div>
      <div class="ch-playing-icon">
        <div class="bars${state.isPlaying ? '' : ' paused'}">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="ch-info">
        <div class="ch-title">${ch.title}</div>
      </div>
      <div class="ch-done ${done ? 'complete' : ''}">
        <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#e8a246" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>`;

    item.addEventListener('click', () => loadChapter(i, true));
    chapterList.appendChild(item);
  });
}

function updateActiveItem() {
  document.querySelectorAll('.chapter-item').forEach((el, i) => {
    el.classList.toggle('active', i === state.currentIdx);
    el.classList.toggle('is-playing', i === state.currentIdx && state.isPlaying);
    const bars = el.querySelector('.bars');
    if (bars) bars.classList.toggle('paused', !state.isPlaying);
    const doneEl = el.querySelector('.ch-done');
    if (doneEl) {
      doneEl.classList.toggle('complete', !!state.completed[CHAPTERS[i].id]);
      doneEl.querySelector('svg').style.display = state.completed[CHAPTERS[i].id] ? 'block' : 'none';
    }
  });
}

function scrollToActive() {
  const active = chapterList.querySelector('.chapter-item.active');
  if (active) active.scrollIntoView({block: 'nearest', behavior: 'smooth'});
}

function updateOverallProgress() {
  const done = Object.keys(state.completed).length;
  const pct = Math.round((done / CHAPTERS.length) * 100);
  overallProg.style.width = pct + '%';
  progressLbl.textContent = `${done} of ${CHAPTERS.length} chapters complete`;
}

// ── Load chapter ────────────────────────────────────────
function loadChapter(idx, autoPlay = false) {
  if (idx < 0 || idx >= CHAPTERS.length) return;
  const ch = CHAPTERS[idx];
  state.currentIdx = idx;
  audio.src = ch.url;
  audio.playbackRate = SPEEDS[state.speedIdx];
  npTitle.textContent = ch.title;
  timeCurrent.textContent = '0:00';
  timeTotal.textContent = '0:00';
  updateSeekGradient(0);
  seekBar.value = 0;

  const savedPos = state.positions[ch.id];
  if (savedPos && savedPos > 5) {
    audio.addEventListener('loadedmetadata', () => {
      audio.currentTime = savedPos;
    }, {once: true});
  }

  if (autoPlay) {
    audio.play().catch(()=>{});
    state.isPlaying = true;
  } else {
    state.isPlaying = false;
  }

  updatePlayIcon();
  updateActiveItem();
  scrollToActive();
  saveState();
}

// ── Playback controls ───────────────────────────────────
function updatePlayIcon() {
  iconPlay.style.display  = state.isPlaying ? 'none' : 'block';
  iconPause.style.display = state.isPlaying ? 'block' : 'none';
}

btnPlay.addEventListener('click', () => {
  if (audio.src && audio.src !== window.location.href) {
    if (state.isPlaying) {
      audio.pause();
      state.isPlaying = false;
    } else {
      audio.play().catch(()=>{});
      state.isPlaying = true;
    }
  } else {
    loadChapter(state.currentIdx, true);
    return;
  }
  updatePlayIcon();
  updateActiveItem();
  saveState();
});

btnPrev.addEventListener('click', () => {
  if (audio.currentTime > 4) { audio.currentTime = 0; return; }
  loadChapter(state.currentIdx - 1, state.isPlaying);
});
btnNext.addEventListener('click', () => loadChapter(state.currentIdx + 1, state.isPlaying));
btnBack.addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
btnFwd.addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15); });

btnSpeed.addEventListener('click', () => {
  state.speedIdx = (state.speedIdx + 1) % SPEEDS.length;
  const sp = SPEEDS[state.speedIdx];
  audio.playbackRate = sp;
  btnSpeed.textContent = sp.toFixed(2).replace(/\.?0+$/, '') + '×';
  saveState();
});

volumeBar.addEventListener('input', () => { audio.volume = volumeBar.value; });

// ── Seek ────────────────────────────────────────────────
let isSeeking = false;
seekBar.addEventListener('mousedown', () => isSeeking = true);
seekBar.addEventListener('touchstart', () => isSeeking = true, {passive:true});
seekBar.addEventListener('input', () => {
  const pct = seekBar.value;
  updateSeekGradient(pct);
  if (audio.duration) {
    timeCurrent.textContent = fmt(audio.duration * pct / 100);
  }
});
seekBar.addEventListener('change', () => {
  if (audio.duration) audio.currentTime = audio.duration * seekBar.value / 100;
  isSeeking = false;
});

// ── Audio events ────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (isSeeking || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  seekBar.value = pct;
  updateSeekGradient(pct);
  timeCurrent.textContent = fmt(audio.currentTime);
  if (Math.floor(audio.currentTime) % 5 === 0) {
    state.positions[CHAPTERS[state.currentIdx].id] = audio.currentTime;
    saveState();
  }
});

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = fmt(audio.duration);
});

audio.addEventListener('play', () => {
  state.isPlaying = true;
  updatePlayIcon();
  updateActiveItem();
});
audio.addEventListener('pause', () => {
  state.isPlaying = false;
  updatePlayIcon();
  updateActiveItem();
  state.positions[CHAPTERS[state.currentIdx].id] = audio.currentTime;
  saveState();
});

audio.addEventListener('ended', () => {
  state.completed[CHAPTERS[state.currentIdx].id] = true;
  state.positions[CHAPTERS[state.currentIdx].id] = 0;
  saveState();
  updateOverallProgress();
  if (state.currentIdx + 1 < CHAPTERS.length) {
    loadChapter(state.currentIdx + 1, true);
  } else {
    state.isPlaying = false;
    updatePlayIcon();
    updateActiveItem();
  }
});

audio.addEventListener('error', () => {
  npTitle.textContent = 'Error loading — check your connection';
});

// ── Keyboard shortcuts ───────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
  if (e.code === 'ArrowLeft')  audio.currentTime = Math.max(0, audio.currentTime - 15);
  if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 15);
  if (e.code === 'ArrowUp')    loadChapter(state.currentIdx - 1, state.isPlaying);
  if (e.code === 'ArrowDown')  loadChapter(state.currentIdx + 1, state.isPlaying);
});

// ── Media Session API ─────────────────────────────────
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play',         () => { audio.play(); });
  navigator.mediaSession.setActionHandler('pause',        () => { audio.pause(); });
  navigator.mediaSession.setActionHandler('previoustrack',() => btnPrev.click());
  navigator.mediaSession.setActionHandler('nexttrack',    () => btnNext.click());
  navigator.mediaSession.setActionHandler('seekbackward', () => btnBack.click());
  navigator.mediaSession.setActionHandler('seekforward',  () => btnFwd.click());
}

function updateMediaSession() {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: CHAPTERS[state.currentIdx].title,
      artist: 'Michael Lewis',
      album: 'Playing to Win'
    });
  }
}

audio.addEventListener('play', updateMediaSession);

// ── Offline detection ────────────────────────────────────
function checkOnline() {
  offlineBanner.classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online',  checkOnline);
window.addEventListener('offline', checkOnline);
checkOnline();

// ── Init ────────────────────────────────────────────────
loadState();
document.getElementById('chapter-count').textContent = CHAPTERS.length + ' tracks';
btnSpeed.textContent = SPEEDS[state.speedIdx].toFixed(2).replace(/\.?0+$/, '') + '×';
renderList();
updateOverallProgress();

const lastCh = CHAPTERS[state.currentIdx];
npTitle.textContent = lastCh.title;
audio.src = lastCh.url;
audio.playbackRate = SPEEDS[state.speedIdx];
const savedPos = state.positions[lastCh.id];
if (savedPos && savedPos > 5) {
  audio.addEventListener('loadedmetadata', () => {
    audio.currentTime = savedPos;
    timeCurrent.textContent = fmt(savedPos);
  }, {once: true});
}
</script>
</body>
</html>
