<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDA JSON Viewer</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* ===========================================
           CSS RESET & ROOT VARIABLES
           =========================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Primary color palette - Professional blue theme */
            --primary-50: #eff6ff;
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-300: #93c5fd;
            --primary-400: #60a5fa;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --primary-800: #1e40af;
            --primary-900: #1e3a8a;

            /* Neutral colors */
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;

            /* Semantic colors */
            --success-500: #22c55e;
            --success-600: #16a34a;
            --danger-500: #ef4444;
            --danger-600: #dc2626;
            --warning-500: #f59e0b;

            /* JSON syntax colors */
            --syntax-string: #a5d6ff;
            --syntax-number: #79c0ff;
            --syntax-boolean: #ff7b72;
            --syntax-null: #ffa657;
            --syntax-key: #7ee787;

            /* Layout */
            --header-height: 60px;
            --border-radius: 8px;
            --transition-speed: 0.2s;
        }

        /* ===========================================
           BASE STYLES
           =========================================== */
        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-900);
            color: var(--gray-100);
            line-height: 1.6;
            overflow: hidden;
        }

        /* ===========================================
           APP LAYOUT
           =========================================== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .app-header {
            height: var(--header-height);
            background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-900) 100%);
            border-bottom: 1px solid var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-700) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-200) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* ===========================================
           BUTTONS
           =========================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
            color: white;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-500) 100%);
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--gray-700);
            color: var(--gray-100);
            border: 1px solid var(--gray-600);
        }

        .btn-secondary:hover {
            background: var(--gray-600);
            border-color: var(--gray-500);
        }

        .btn-danger {
            background: var(--danger-500);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-600);
        }

        .btn-icon {
            padding: 10px;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===========================================
           MAIN CONTENT
           =========================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
        }

        /* ===========================================
           UPLOAD ZONE
           =========================================== */
        .upload-zone {
            border: 2px dashed var(--gray-600);
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            transition: all var(--transition-speed) ease;
            background: var(--gray-800);
            cursor: pointer;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-zone:hover,
        .upload-zone.dragging {
            border-color: var(--primary-500);
            background: rgba(59, 130, 246, 0.1);
        }

        .upload-zone.dragging {
            transform: scale(1.01);
        }

        .upload-zone.hidden {
            display: none;
        }

        .upload-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            color: var(--primary-400);
            opacity: 0.8;
        }

        .upload-icon svg {
            width: 100%;
            height: 100%;
        }

        .upload-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--gray-100);
            margin-bottom: 8px;
        }

        .upload-subtitle {
            font-size: 14px;
            color: var(--gray-400);
            margin-bottom: 24px;
        }

        .upload-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* ===========================================
           VIEWER CONTAINER
           =========================================== */
        .viewer-container {
            flex: 1;
            display: none;
            flex-direction: column;
            background: var(--gray-800);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--gray-700);
        }

        .viewer-container.active {
            display: flex;
        }

        .viewer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-900) 100%);
            border-bottom: 1px solid var(--gray-700);
            flex-wrap: wrap;
            gap: 10px;
        }

        .viewer-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-200);
        }

        .viewer-title svg {
            width: 18px;
            height: 18px;
            color: var(--primary-400);
        }

        .viewer-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .view-toggle {
            display: flex;
            background: var(--gray-900);
            border-radius: 6px;
            padding: 2px;
        }

        .view-toggle-btn {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            background: transparent;
            color: var(--gray-400);
            cursor: pointer;
            border-radius: 4px;
            transition: all var(--transition-speed) ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .view-toggle-btn svg {
            width: 14px;
            height: 14px;
        }

        .view-toggle-btn.active {
            background: var(--primary-600);
            color: white;
        }

        .view-toggle-btn:hover:not(.active) {
            color: var(--gray-200);
        }

        /* ===========================================
           VIEWER CONTENT
           =========================================== */
        .viewer-content {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }

        /* ===========================================
           JSON TREE STYLES
           =========================================== */
        .json-tree {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.8;
        }

        .json-node {
            position: relative;
        }

        .json-node-content {
            display: flex;
            align-items: flex-start;
            padding: 2px 4px;
            border-radius: 4px;
            margin-left: -4px;
        }

        .json-node-content:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .json-node-content.expandable {
            cursor: pointer;
        }

        .json-toggle {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            transition: transform var(--transition-speed) ease;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .json-toggle svg {
            width: 14px;
            height: 14px;
        }

        .json-toggle.expanded {
            transform: rotate(90deg);
        }

        .json-toggle-placeholder {
            width: 18px;
            flex-shrink: 0;
        }

        .json-key {
            color: var(--syntax-key);
        }

        .json-colon {
            color: var(--gray-400);
            margin: 0 6px;
        }

        .json-string {
            color: var(--syntax-string);
            word-break: break-word;
        }

        .json-number {
            color: var(--syntax-number);
        }

        .json-boolean {
            color: var(--syntax-boolean);
        }

        .json-null {
            color: var(--syntax-null);
            font-style: italic;
        }

        .json-bracket {
            color: var(--gray-400);
        }

        .json-collapsed-info {
            color: var(--gray-500);
            font-size: 12px;
            margin-left: 4px;
        }

        .json-children {
            margin-left: 20px;
            padding-left: 16px;
            border-left: 1px solid var(--gray-700);
        }

        .json-closing-bracket {
            color: var(--gray-400);
            margin-left: 20px;
        }

        /* ===========================================
           RAW VIEW
           =========================================== */
        .json-raw {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            color: var(--gray-300);
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }

        .json-raw.active {
            display: block;
        }

        .json-tree.hidden {
            display: none;
        }

        /* ===========================================
           ERROR MESSAGE
           =========================================== */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-500);
            border-radius: var(--border-radius);
            padding: 16px;
            color: #fca5a5;
            font-size: 14px;
            margin-top: 20px;
        }

        /* ===========================================
           TOAST NOTIFICATIONS
           =========================================== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--gray-800);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--gray-700);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 360px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .toast-icon svg {
            width: 100%;
            height: 100%;
        }

        .toast.success .toast-icon {
            color: var(--success-500);
        }

        .toast.error .toast-icon {
            color: var(--danger-500);
        }

        .toast-message {
            font-size: 14px;
            color: var(--gray-200);
        }

        /* ===========================================
           FILE INPUT (Hidden)
           =========================================== */
        .hidden-input {
            display: none;
        }

        /* ===========================================
           SCROLLBAR STYLES
           =========================================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-800);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-600);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-500);
        }

        /* ===========================================
           RESPONSIVE STYLES
           =========================================== */
        @media (max-width: 768px) {
            .header-actions .btn-text {
                display: none;
            }

            .header-actions .btn {
                padding: 10px;
            }

            .upload-actions {
                flex-direction: column;
                width: 100%;
                max-width: 250px;
            }

            .upload-actions .btn {
                width: 100%;
                justify-content: center;
            }

            .viewer-header {
                flex-direction: column;
                align-items: stretch;
            }

            .viewer-actions {
                justify-content: space-between;
            }

            .upload-zone {
                padding: 40px 20px;
            }

            .upload-icon {
                width: 60px;
                height: 60px;
            }
        }

        /* ===========================================
           KEYBOARD SHORTCUTS HINT
           =========================================== */
        .shortcuts-hint {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 24px;
        }

        .shortcuts-hint kbd {
            background: var(--gray-700);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">{}</div>
                <span class="logo-text">TDA JSON Viewer</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="importBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    <span class="btn-text">Import JSON</span>
                </button>
                <button class="btn btn-secondary" id="exportBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    <span class="btn-text">Export</span>
                </button>
                <button class="btn btn-secondary" id="copyBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                    </svg>
                    <span class="btn-text">Copy</span>
                </button>
                <button class="btn btn-danger btn-icon" id="clearBtn" style="display: none;" title="Clear">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Hidden file input -->
        <input type="file" id="fileInput" class="hidden-input" accept=".json,application/json">

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Zone -->
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                </div>
                <h2 class="upload-title">Drop your JSON file here</h2>
                <p class="upload-subtitle">or click to browse your files</p>
                <div class="upload-actions">
                    <button class="btn btn-primary" id="browseBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                        </svg>
                        Browse Files
                    </button>
                    <button class="btn btn-secondary" id="demoBtn">
                        Load Demo Data
                    </button>
                </div>
                <div class="shortcuts-hint">
                    <kbd>Ctrl</kbd> + <kbd>O</kbd> to open file &nbsp;•&nbsp;
                    <kbd>Ctrl</kbd> + <kbd>C</kbd> to copy
                </div>
                <div class="error-message" id="errorMessage" style="display: none;"></div>
            </div>

            <!-- Viewer Container -->
            <div class="viewer-container" id="viewerContainer">
                <div class="viewer-header">
                    <div class="viewer-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                        </svg>
                        <span id="fileName">data.json</span>
                    </div>
                    <div class="viewer-actions">
                        <div class="view-toggle">
                            <button class="view-toggle-btn active" id="treeViewBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="7" height="7" />
                                    <rect x="14" y="3" width="7" height="7" />
                                    <rect x="14" y="14" width="7" height="7" />
                                    <rect x="3" y="14" width="7" height="7" />
                                </svg>
                                Tree
                            </button>
                            <button class="view-toggle-btn" id="rawViewBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="16 18 22 12 16 6" />
                                    <polyline points="8 6 2 12 8 18" />
                                </svg>
                                Raw
                            </button>
                        </div>
                        <button class="btn btn-secondary btn-icon" id="expandAllBtn" title="Expand All">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 3 21 3 21 9" />
                                <polyline points="9 21 3 21 3 15" />
                                <line x1="21" y1="3" x2="14" y2="10" />
                                <line x1="3" y1="21" x2="10" y2="14" />
                            </svg>
                        </button>
                        <button class="btn btn-secondary btn-icon" id="collapseAllBtn" title="Collapse All">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="4 14 10 14 10 20" />
                                <polyline points="20 10 14 10 14 4" />
                                <line x1="14" y1="10" x2="21" y2="3" />
                                <line x1="3" y1="21" x2="10" y2="14" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="viewer-content">
                    <div class="json-tree" id="jsonTree"></div>
                    <pre class="json-raw" id="jsonRaw"></pre>
                </div>
            </div>
        </main>

        <!-- Toast Container -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script>
        // ===========================================
        // APPLICATION STATE
        // ===========================================
        const state = {
            jsonData: null,
            fileName: '',
            viewMode: 'tree',
            expandedNodes: new Set()
        };

        // ===========================================
        // DOM ELEMENTS
        // ===========================================
        const elements = {
            fileInput: document.getElementById('fileInput'),
            uploadZone: document.getElementById('uploadZone'),
            viewerContainer: document.getElementById('viewerContainer'),
            jsonTree: document.getElementById('jsonTree'),
            jsonRaw: document.getElementById('jsonRaw'),
            fileName: document.getElementById('fileName'),
            errorMessage: document.getElementById('errorMessage'),
            toastContainer: document.getElementById('toastContainer'),
            importBtn: document.getElementById('importBtn'),
            exportBtn: document.getElementById('exportBtn'),
            copyBtn: document.getElementById('copyBtn'),
            clearBtn: document.getElementById('clearBtn'),
            browseBtn: document.getElementById('browseBtn'),
            demoBtn: document.getElementById('demoBtn'),
            treeViewBtn: document.getElementById('treeViewBtn'),
            rawViewBtn: document.getElementById('rawViewBtn'),
            expandAllBtn: document.getElementById('expandAllBtn'),
            collapseAllBtn: document.getElementById('collapseAllBtn')
        };

        // ===========================================
        // TOAST NOTIFICATIONS
        // ===========================================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="toast-icon">
                    ${type === 'success' 
                        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12" /></svg>'
                        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                    }
                </span>
                <span class="toast-message">${message}</span>
            `;
            
            elements.toastContainer.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ===========================================
        // JSON PARSING
        // ===========================================
        function parseJson(content, fileName) {
            try {
                const parsed = JSON.parse(content);
                state.jsonData = parsed;
                state.fileName = fileName;
                state.expandedNodes.clear();
                
                // Initialize expanded nodes (expand first 2 levels)
                initializeExpandedNodes(parsed, '', 0, 2);
                
                showViewer();
                renderTree();
                renderRaw();
                
                showToast(`Successfully loaded ${fileName}`, 'success');
            } catch (e) {
                showError(`Invalid JSON: ${e.message}`);
                showToast('Failed to parse JSON file', 'error');
            }
        }

        function initializeExpandedNodes(data, path, depth, maxDepth) {
            if (depth >= maxDepth) return;
            if (typeof data !== 'object' || data === null) return;
            
            state.expandedNodes.add(path || 'root');
            
            Object.keys(data).forEach(key => {
                const newPath = path ? `${path}.${key}` : key;
                initializeExpandedNodes(data[key], newPath, depth + 1, maxDepth);
            });
        }

        // ===========================================
        // UI UPDATES
        // ===========================================
        function showViewer() {
            elements.uploadZone.classList.add('hidden');
            elements.viewerContainer.classList.add('active');
            elements.fileName.textContent = state.fileName;
            elements.exportBtn.disabled = false;
            elements.copyBtn.disabled = false;
            elements.clearBtn.style.display = 'inline-flex';
            elements.errorMessage.style.display = 'none';
        }

        function hideViewer() {
            elements.uploadZone.classList.remove('hidden');
            elements.viewerContainer.classList.remove('active');
            elements.exportBtn.disabled = true;
            elements.copyBtn.disabled = true;
            elements.clearBtn.style.display = 'none';
            state.jsonData = null;
            state.fileName = '';
        }

        function showError(message) {
            elements.errorMessage.textContent = message;
            elements.errorMessage.style.display = 'block';
        }

        function setViewMode(mode) {
            state.viewMode = mode;
            
            if (mode === 'tree') {
                elements.treeViewBtn.classList.add('active');
                elements.rawViewBtn.classList.remove('active');
                elements.jsonTree.classList.remove('hidden');
                elements.jsonRaw.classList.remove('active');
                elements.expandAllBtn.style.display = '';
                elements.collapseAllBtn.style.display = '';
            } else {
                elements.treeViewBtn.classList.remove('active');
                elements.rawViewBtn.classList.add('active');
                elements.jsonTree.classList.add('hidden');
                elements.jsonRaw.classList.add('active');
                elements.expandAllBtn.style.display = 'none';
                elements.collapseAllBtn.style.display = 'none';
            }
        }

        // ===========================================
        // JSON TREE RENDERING
        // ===========================================
        function getValueType(value) {
            if (value === null) return 'null';
            if (Array.isArray(value)) return 'array';
            return typeof value;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderValue(value, type) {
            switch (type) {
                case 'string':
                    return `<span class="json-string">"${escapeHtml(value)}"</span>`;
                case 'number':
                    return `<span class="json-number">${value}</span>`;
                case 'boolean':
                    return `<span class="json-boolean">${value}</span>`;
                case 'null':
                    return `<span class="json-null">null</span>`;
                default:
                    return escapeHtml(String(value));
            }
        }

        function renderNode(key, value, path, isArrayItem = false) {
            const type = getValueType(value);
            const isExpandable = type === 'object' || type === 'array';
            const nodePath = path || 'root';
            const isExpanded = state.expandedNodes.has(nodePath);
            const isEmpty = isExpandable && Object.keys(value).length === 0;
            
            let html = '<div class="json-node">';
            
            // Node content (clickable header)
            html += `<div class="json-node-content${isExpandable && !isEmpty ? ' expandable' : ''}" data-path="${nodePath}">`;
            
            // Toggle icon
            if (isExpandable && !isEmpty) {
                html += `<span class="json-toggle${isExpanded ? ' expanded' : ''}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </span>`;
            } else {
                html += '<span class="json-toggle-placeholder"></span>';
            }
            
            // Key
            if (key !== null && !isArrayItem) {
                html += `<span class="json-key">"${escapeHtml(key)}"</span>`;
                html += '<span class="json-colon">:</span>';
            }
            
            // Value or bracket
            if (!isExpandable) {
                html += renderValue(value, type);
            } else if (isEmpty) {
                html += `<span class="json-bracket">${type === 'array' ? '[]' : '{}'}</span>`;
            } else {
                html += `<span class="json-bracket">${type === 'array' ? '[' : '{'}</span>`;
                if (!isExpanded) {
                    const count = Object.keys(value).length;
                    html += `<span class="json-collapsed-info">…${count} ${count === 1 ? 'item' : 'items'}</span>`;
                    html += `<span class="json-bracket">${type === 'array' ? ']' : '}'}</span>`;
                }
            }
            
            html += '</div>';
            
            // Children
            if (isExpandable && !isEmpty && isExpanded) {
                html += '<div class="json-children">';
                const entries = Object.entries(value);
                entries.forEach(([k, v], index) => {
                    const childPath = path ? `${path}.${k}` : k;
                    html += renderNode(type === 'array' ? index : k, v, childPath, type === 'array');
                });
                html += '</div>';
                html += `<span class="json-closing-bracket">${type === 'array' ? ']' : '}'}</span>`;
            }
            
            html += '</div>';
            return html;
        }

        function renderTree() {
            if (!state.jsonData) return;
            elements.jsonTree.innerHTML = renderNode(null, state.jsonData, '');
            attachTreeEventListeners();
        }

        function renderRaw() {
            if (!state.jsonData) return;
            elements.jsonRaw.textContent = JSON.stringify(state.jsonData, null, 2);
        }

        function attachTreeEventListeners() {
            elements.jsonTree.querySelectorAll('.json-node-content.expandable').forEach(node => {
                node.addEventListener('click', () => {
                    const path = node.dataset.path;
                    if (state.expandedNodes.has(path)) {
                        state.expandedNodes.delete(path);
                    } else {
                        state.expandedNodes.add(path);
                    }
                    renderTree();
                });
            });
        }

        // ===========================================
        // EXPAND/COLLAPSE ALL
        // ===========================================
        function expandAll() {
            function addAllPaths(data, path) {
                if (typeof data !== 'object' || data === null) return;
                state.expandedNodes.add(path || 'root');
                Object.keys(data).forEach(key => {
                    const newPath = path ? `${path}.${key}` : key;
                    addAllPaths(data[key], newPath);
                });
            }
            addAllPaths(state.jsonData, '');
            renderTree();
        }

        function collapseAll() {
            state.expandedNodes.clear();
            renderTree();
        }

        // ===========================================
        // FILE HANDLING
        // ===========================================
        function handleFileSelect(event) {
            const file = event.target.files?.[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                parseJson(e.target.result, file.name);
            };
            reader.onerror = () => {
                showError('Failed to read file');
                showToast('Failed to read file', 'error');
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function handleDragOver(event) {
            event.preventDefault();
            elements.uploadZone.classList.add('dragging');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            elements.uploadZone.classList.remove('dragging');
        }

        function handleDrop(event) {
            event.preventDefault();
            elements.uploadZone.classList.remove('dragging');
            
            const file = event.dataTransfer.files?.[0];
            if (!file) return;
            
            if (!file.name.endsWith('.json')) {
                showToast('Please drop a .json file', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                parseJson(e.target.result, file.name);
            };
            reader.readAsText(file);
        }

        // ===========================================
        // EXPORT & COPY
        // ===========================================
        function exportJson() {
            if (!state.jsonData) return;
            
            const blob = new Blob([JSON.stringify(state.jsonData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = state.fileName || 'export.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('JSON exported successfully', 'success');
        }

        function copyJson() {
            if (!state.jsonData) return;
            
            navigator.clipboard.writeText(JSON.stringify(state.jsonData, null, 2))
                .then(() => showToast('Copied to clipboard', 'success'))
                .catch(() => showToast('Failed to copy', 'error'));
        }

        // ===========================================
        // DEMO DATA
        // ===========================================
        function loadDemoData() {
            const demoData = {
                "project": "TDA JSON Viewer",
                "version": "1.0.0",
                "description": "A professional JSON viewer with tree navigation",
                "author": {
                    "name": "Eric",
                    "role": "Principal BI Architect",
                    "company": "Onebridge/Marlabs",
                    "website": "thinkdataanalysis.com"
                },
                "features": [
                    "Import JSON files",
                    "Tree view navigation",
                    "Raw JSON view",
                    "Export functionality",
                    "Copy to clipboard",
                    "Drag and drop support"
                ],
                "settings": {
                    "theme": "dark",
                    "colors": {
                        "primary": "#3b82f6",
                        "background": "#111827",
                        "text": "#f3f4f6",
                        "syntax": {
                            "string": "#a5d6ff",
                            "number": "#79c0ff",
                            "boolean": "#ff7b72",
                            "null": "#ffa657",
                            "key": "#7ee787"
                        }
                    },
                    "expandDepth": 2,
                    "syntaxHighlight": true
                },
                "stats": {
                    "linesOfCode": 850,
                    "fileSize": "24KB",
                    "loadTime": "0.1s"
                },
                "dependencies": [],
                "isActive": true,
                "lastUpdated": "2025-01-15T10:30:00Z",
                "metadata": null
            };
            
            parseJson(JSON.stringify(demoData), 'demo-data.json');
        }

        // ===========================================
        // KEYBOARD SHORTCUTS
        // ===========================================
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + O: Open file
                if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                    e.preventDefault();
                    elements.fileInput.click();
                }
                
                // Ctrl/Cmd + C: Copy (only when viewer is active and no text selected)
                if ((e.ctrlKey || e.metaKey) && e.key === 'c' && state.jsonData && !window.getSelection().toString()) {
                    e.preventDefault();
                    copyJson();
                }
                
                // Ctrl/Cmd + S: Export/Save
                if ((e.ctrlKey || e.metaKey) && e.key === 's' && state.jsonData) {
                    e.preventDefault();
                    exportJson();
                }
                
                // Escape: Clear/go back
                if (e.key === 'Escape' && state.jsonData) {
                    hideViewer();
                }
            });
        }

        // ===========================================
        // EVENT LISTENERS
        // ===========================================
        function initEventListeners() {
            // File input
            elements.fileInput.addEventListener('change', handleFileSelect);
            
            // Upload zone
            elements.uploadZone.addEventListener('dragover', handleDragOver);
            elements.uploadZone.addEventListener('dragleave', handleDragLeave);
            elements.uploadZone.addEventListener('drop', handleDrop);
            elements.uploadZone.addEventListener('click', (e) => {
                if (e.target === elements.uploadZone || e.target.closest('.upload-icon') || 
                    e.target.closest('.upload-title') || e.target.closest('.upload-subtitle')) {
                    elements.fileInput.click();
                }
            });
            
            // Buttons
            elements.importBtn.addEventListener('click', () => elements.fileInput.click());
            elements.exportBtn.addEventListener('click', exportJson);
            elements.copyBtn.addEventListener('click', copyJson);
            elements.clearBtn.addEventListener('click', hideViewer);
            elements.browseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                elements.fileInput.click();
            });
            elements.demoBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                loadDemoData();
            });
            
            // View toggle
            elements.treeViewBtn.addEventListener('click', () => setViewMode('tree'));
            elements.rawViewBtn.addEventListener('click', () => setViewMode('raw'));
            
            // Expand/Collapse
            elements.expandAllBtn.addEventListener('click', expandAll);
            elements.collapseAllBtn.addEventListener('click', collapseAll);
        }

        // ===========================================
        // INITIALIZATION
        // ===========================================
        function init() {
            initEventListeners();
            initKeyboardShortcuts();
        }

        // Start the application
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
