<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric's Notes — Bookmark Manager</title>
    <style>
        /* ── Theme tokens — default: dark ── */
        :root {
            --bg: #0b0c10;
            --bg2: #0b0c10;
            --card: rgba(255,255,255,.06);
            --border: rgba(255,255,255,.12);
            --text: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.65);
            --shadow: 0 10px 30px rgba(0,0,0,.35);
            --accent: rgba(32,201,151,.28);
            --accentBorder: rgba(32,201,151,.35);
            --danger: rgba(255,99,132,.22);
            --dangerBorder: rgba(255,99,132,.35);
            --inputBg: rgba(255,255,255,.06);
            --cardHover: rgba(255,255,255,.09);
            --pageGlow1: rgba(76,110,245,.25);
            --pageGlow2: rgba(32,201,151,.15);
            --linkColor: #9ecbff;
        }
        html[data-theme="light"] {
            --bg: #f6f7fb;
            --bg2: #ffffff;
            --card: rgba(0,0,0,.03);
            --border: rgba(0,0,0,.10);
            --text: rgba(0,0,0,.88);
            --muted: rgba(0,0,0,.55);
            --shadow: 0 10px 30px rgba(0,0,0,.10);
            --accent: rgba(32,201,151,.22);
            --accentBorder: rgba(32,201,151,.35);
            --danger: rgba(255,99,132,.16);
            --dangerBorder: rgba(255,99,132,.28);
            --inputBg: rgba(255,255,255,.80);
            --cardHover: rgba(0,0,0,.05);
            --pageGlow1: rgba(76,110,245,.14);
            --pageGlow2: rgba(32,201,151,.10);
            --linkColor: #0b62ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background:
                radial-gradient(900px 500px at 10% 10%, var(--pageGlow1), transparent 60%),
                radial-gradient(900px 500px at 90% 10%, var(--pageGlow2), transparent 60%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .2px; color: var(--text); }
        .header .subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
        .bookmark-count {
            background: var(--accent);
            border: 1px solid var(--accentBorder);
            color: var(--text);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 50px;
        }

        /* ── Theme toggle ── */
        .theme-toggle {
            width: 32px; height: 32px; padding: 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .theme-toggle:hover { background: var(--cardHover); color: var(--text); }

        /* ── Layout ── */
        .container { max-width: 980px; margin: 0 auto; padding: 1.5rem 1rem; }

        /* ── Add Bookmark Form ── */
        .add-form {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }
        .add-form h2 {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input, select, textarea {
            background: var(--inputBg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accentBorder); }
        textarea { resize: vertical; min-height: 60px; }
        select { cursor: pointer; background: #1a1b23; }
        html[data-theme="light"] select { background: #ffffff; }
        select option { background: #1a1b23; color: rgba(255,255,255,.92); }
        html[data-theme="light"] select option { background: #ffffff; color: rgba(0,0,0,.88); }
        .form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255,255,255,.08);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        html[data-theme="light"] .btn { background: rgba(0,0,0,.05); }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: var(--accent); border-color: var(--accentBorder); }
        .btn-secondary { background: rgba(255,255,255,.06); }
        html[data-theme="light"] .btn-secondary { background: rgba(0,0,0,.04); }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
        .btn-icon {
            width: 30px; height: 30px; padding: 0;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 8px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-icon:hover { border-color: var(--border); background: var(--cardHover); color: var(--text); }
        .btn-icon.danger:hover { border-color: var(--dangerBorder); background: var(--danger); color: #ff6384; }

        /* ── Toolbar ── */
        .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .category-filters { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-chip {
            padding: 0.3rem 0.85rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            transition: all 0.15s;
        }
        .filter-chip:hover { color: var(--text); border-color: var(--accentBorder); }
        .filter-chip.active { border-color: transparent; color: var(--text); }
        .search-box { position: relative; min-width: 220px; }
        .search-box input { width: 100%; padding-left: 2.2rem; }
        .search-box svg { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); color: var(--muted); }

        /* ── Bookmark Cards ── */
        .bookmarks-grid { display: flex; flex-direction: column; gap: 0.4rem; }
        .bookmark-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.9rem 1.1rem;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1rem;
            align-items: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .bookmark-card:hover { background: var(--cardHover); border-color: var(--accentBorder); }
        .category-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .bookmark-info { min-width: 0; }
        .bookmark-url {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--linkColor);
            text-decoration: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bookmark-url:hover { text-decoration: underline; }
        .bookmark-meta { display: flex; align-items: center; gap: 0.75rem; margin-top: 4px; font-size: 0.76rem; color: var(--muted); }
        .cat-badge { font-size: 0.68rem; font-weight: 600; padding: 2px 8px; border-radius: 50px; color: #fff; opacity: 0.9; }
        .bookmark-note { font-size: 0.82rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }
        .bookmark-actions { display: flex; gap: 2px; }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
        .empty-state svg { margin-bottom: 1rem; opacity: 0.35; }
        .empty-state p { font-size: 0.95rem; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #12131a;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            width: 90%;
            max-width: 460px;
            box-shadow: var(--shadow);
        }
        html[data-theme="light"] .modal { background: #ffffff; }
        .modal h3 { font-size: 1rem; margin-bottom: 1rem; }
        .modal .form-group { margin-bottom: 0.75rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

        /* ── Toast ── */
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast {
            background: rgba(0,0,0,.70);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,.92);
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-left: 3px solid #20c997; }
        .toast.error   { border-left: 3px solid #ff6384; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ── Color swatches ── */
        .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
        .color-swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
        .color-swatch:hover, .color-swatch.selected { border-color: rgba(255,255,255,.8); transform: scale(1.15); }
        html[data-theme="light"] .color-swatch:hover,
        html[data-theme="light"] .color-swatch.selected { border-color: rgba(0,0,0,.5); }

        /* ── Password gate ── */
        #pw-gate {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 999;
        }
        #pw-gate.hidden { display: none; }
        .pw-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 360px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .pw-icon {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: var(--accent);
            border: 1px solid var(--accentBorder);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 700;
            margin: 0 auto 1rem;
            color: var(--text);
        }
        .pw-box h2 { font-size: 1.1rem; margin-bottom: 0.4rem; }
        .pw-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; }
        .pw-field {
            width: 100%;
            background: var(--inputBg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.65rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        .pw-field:focus { border-color: var(--accentBorder); }
        .pw-submit {
            width: 100%; padding: 10px;
            background: var(--accent);
            border: 1px solid var(--accentBorder);
            color: var(--text);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .pw-submit:hover { opacity: 0.8; }
        .pw-error {
            margin-top: 10px; font-size: 0.8rem;
            color: #ff6384; display: none;
        }
        .pw-error.visible { display: block; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header { padding: 0.85rem 1rem; }
            .container { padding: 1rem; }
            .form-row { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box { min-width: unset; }
            .bookmark-card { grid-template-columns: auto 1fr; }
            .bookmark-actions { grid-column: 1 / -1; justify-content: flex-end; }
        }
    </style>
</head>
<body>

<!-- Password gate -->
<div id="pw-gate">
    <div class="pw-box">
        <div class="pw-icon">E</div>
        <h2>Eric's Notes</h2>
        <p>Enter your password to continue.</p>
        <input class="pw-field" type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
        <button class="pw-submit" id="pw-submit">Unlock</button>
        <div class="pw-error" id="pw-error">Incorrect password. Please try again.</div>
    </div>
</div>

<script>
    (function () {
        const HASH = "d0cafc5533f05c610909887d74d9232650aaab2f3f4bb5dfba250cc08805071d";
        const KEY  = "eric_notes_auth";

        async function sha256(str) {
            const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        const gate   = document.getElementById("pw-gate");
        const input  = document.getElementById("pw-input");
        const btn    = document.getElementById("pw-submit");
        const errMsg = document.getElementById("pw-error");

        if (sessionStorage.getItem(KEY) === "1") {
            gate.classList.add("hidden");
            return;
        }

        async function attempt() {
            const hash = await sha256(input.value);
            if (hash === HASH) {
                sessionStorage.setItem(KEY, "1");
                gate.classList.add("hidden");
            } else {
                errMsg.classList.add("visible");
                input.value = "";
                input.focus();
            }
        }

        btn.addEventListener("click", attempt);
        input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
        input.focus();
    })();
</script>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div>
                <h1>Eric's Notes</h1>
                <div class="subtitle">Universal Bookmark Manager</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <span class="bookmark-count" id="bookmarkCount">0 bookmarks</span>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">
                <svg id="themeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="container">
        <!-- Add Bookmark Form -->
        <div class="add-form">
            <h2>+ Add Bookmark</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="inputUrl" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="inputCategory"></select>
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>Note / Description</label>
                    <textarea id="inputNote" placeholder="What is this link about?" rows="2"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
                <button class="btn btn-primary" onclick="addBookmark()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    Save Bookmark
                </button>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="category-filters" id="categoryFilters"></div>
            <div style="display:flex;gap:8px;align-items:center;">
                <div class="search-box">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" placeholder="Search bookmarks..." oninput="renderBookmarks()">
                </div>
                <button class="btn btn-sm btn-secondary" onclick="openCategoryModal()">+ Category</button>
            </div>
        </div>

        <!-- Bookmarks List -->
        <div class="bookmarks-grid" id="bookmarksList"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>Edit Bookmark</h3>
            <div class="form-group">
                <label>URL</label>
                <input type="url" id="editUrl">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="editCategory"></select>
            </div>
            <div class="form-group">
                <label>Note / Description</label>
                <textarea id="editNote" rows="3"></textarea>
            </div>
            <input type="hidden" id="editId">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <h3>Add New Category</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="newCatName" placeholder="e.g. DevOps">
            </div>
            <div class="form-group">
                <label>Color</label>
                <div class="color-swatches" id="colorSwatches"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeCategoryModal()">Cancel</button>
                <button class="btn btn-primary" onclick="addCategory()">Add Category</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ── State ──
        let bookmarks = [];
        let categories = {};
        let activeFilter = "All";
        let selectedColor = "#6B7280";

        const SWATCH_COLORS = [
            "#EF4444","#F59E0B","#10B981","#3B82F6","#8B5CF6",
            "#EC4899","#0078D4","#14B8A6","#F97316","#6366F1",
            "#84CC16","#06B6D4","#E11D48","#8B5E3C","#6B7280"
        ];

        // ── API base — auto-detect ──
        const API_BASE = window.location.origin + "/api/notes";

        // ── Init ──
        document.addEventListener("DOMContentLoaded", () => {
            fetchBookmarks();
            renderSwatches();

            // Enter key to submit
            document.getElementById("inputUrl").addEventListener("keydown", e => {
                if (e.key === "Enter") addBookmark();
            });
        });

        // ── Fetch data ──
        async function fetchBookmarks() {
            try {
                const res = await fetch(`${API_BASE}/bookmarks`);
                const data = await res.json();
                bookmarks = data.bookmarks || [];
                categories = data.categories || {};
                renderCategoryFilters();
                renderCategoryDropdowns();
                renderBookmarks();
            } catch (err) {
                showToast("Failed to load bookmarks", "error");
                console.error(err);
            }
        }

        // ── Render category filter chips ──
        function renderCategoryFilters() {
            const el = document.getElementById("categoryFilters");
            const allCats = ["All", ...Object.keys(categories)];
            el.innerHTML = allCats.map(cat => {
                const isActive = cat === activeFilter;
                const color = cat === "All" ? "#3B82F6" : categories[cat];
                const style = isActive ? `background:${color};border-color:${color};` : "";
                return `<button class="filter-chip ${isActive ? "active" : ""}" style="${style}" onclick="setFilter('${cat}')">${cat}</button>`;
            }).join("");
        }

        // ── Render category dropdowns ──
        function renderCategoryDropdowns() {
            const opts = Object.keys(categories).map(c => `<option value="${c}">${c}</option>`).join("");
            document.getElementById("inputCategory").innerHTML = opts;
            document.getElementById("editCategory").innerHTML = opts;
        }

        // ── Set filter ──
        function setFilter(cat) {
            activeFilter = cat;
            renderCategoryFilters();
            renderBookmarks();
        }

        // ── Render bookmarks ──
        function renderBookmarks() {
            const list = document.getElementById("bookmarksList");
            const search = document.getElementById("searchInput").value.toLowerCase();

            let filtered = bookmarks;
            if (activeFilter !== "All") {
                filtered = filtered.filter(b => b.category === activeFilter);
            }
            if (search) {
                filtered = filtered.filter(b =>
                    (b.url || "").toLowerCase().includes(search) ||
                    (b.note || "").toLowerCase().includes(search) ||
                    (b.category || "").toLowerCase().includes(search)
                );
            }

            document.getElementById("bookmarkCount").textContent = `${filtered.length} bookmark${filtered.length !== 1 ? "s" : ""}`;

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/></svg>
                        <p>No bookmarks yet. Add your first one above!</p>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map(b => {
                const color = categories[b.category] || "#6B7280";
                const date = new Date(b.date_added).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
                const displayUrl = b.url.replace(/^https?:\/\//, "").replace(/\/$/, "");
                return `
                <div class="bookmark-card">
                    <div class="category-dot" style="background:${color}"></div>
                    <div class="bookmark-info">
                        <a href="${b.url}" target="_blank" rel="noopener" class="bookmark-url" title="${b.url}">${displayUrl}</a>
                        <div class="bookmark-meta">
                            <span class="cat-badge" style="background:${color}">${b.category}</span>
                            <span>${date}</span>
                        </div>
                        ${b.note ? `<div class="bookmark-note">${escapeHtml(b.note)}</div>` : ""}
                    </div>
                    <div class="bookmark-actions">
                        <button class="btn-icon" onclick="copyUrl('${b.url}')" title="Copy URL">
                            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        </button>
                        <button class="btn-icon" onclick="openEditModal(${b.id})" title="Edit">
                            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="btn-icon danger" onclick="deleteBookmark(${b.id})" title="Delete">
                            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>`;
            }).join("");
        }

        // ── Add bookmark ──
        async function addBookmark() {
            const url = document.getElementById("inputUrl").value.trim();
            const category = document.getElementById("inputCategory").value;
            const note = document.getElementById("inputNote").value.trim();

            if (!url) {
                showToast("Please enter a URL", "error");
                document.getElementById("inputUrl").focus();
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/bookmarks`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, category, note })
                });
                if (!res.ok) throw new Error("Failed to add");
                clearForm();
                await fetchBookmarks();
                showToast("Bookmark saved!", "success");
            } catch (err) {
                showToast("Error saving bookmark", "error");
            }
        }

        // ── Delete bookmark ──
        async function deleteBookmark(id) {
            if (!confirm("Delete this bookmark?")) return;
            try {
                await fetch(`${API_BASE}/bookmarks/${id}`, { method: "DELETE" });
                await fetchBookmarks();
                showToast("Bookmark deleted", "success");
            } catch (err) {
                showToast("Error deleting bookmark", "error");
            }
        }

        // ── Edit modal ──
        function openEditModal(id) {
            const b = bookmarks.find(x => x.id === id);
            if (!b) return;
            document.getElementById("editUrl").value = b.url;
            document.getElementById("editCategory").value = b.category;
            document.getElementById("editNote").value = b.note || "";
            document.getElementById("editId").value = b.id;
            document.getElementById("editModal").classList.add("active");
        }
        function closeEditModal() {
            document.getElementById("editModal").classList.remove("active");
        }
        async function saveEdit() {
            const id = parseInt(document.getElementById("editId").value);
            const url = document.getElementById("editUrl").value.trim();
            const category = document.getElementById("editCategory").value;
            const note = document.getElementById("editNote").value.trim();

            if (!url) { showToast("URL is required", "error"); return; }

            try {
                await fetch(`${API_BASE}/bookmarks/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, category, note })
                });
                closeEditModal();
                await fetchBookmarks();
                showToast("Bookmark updated!", "success");
            } catch (err) {
                showToast("Error updating bookmark", "error");
            }
        }

        // ── Category modal ──
        function openCategoryModal() {
            document.getElementById("newCatName").value = "";
            selectedColor = "#6B7280";
            renderSwatches();
            document.getElementById("categoryModal").classList.add("active");
        }
        function closeCategoryModal() {
            document.getElementById("categoryModal").classList.remove("active");
        }
        function renderSwatches() {
            const el = document.getElementById("colorSwatches");
            el.innerHTML = SWATCH_COLORS.map(c =>
                `<div class="color-swatch ${c === selectedColor ? "selected" : ""}" style="background:${c}" onclick="pickColor('${c}')"></div>`
            ).join("");
        }
        function pickColor(c) {
            selectedColor = c;
            renderSwatches();
        }
        async function addCategory() {
            const name = document.getElementById("newCatName").value.trim();
            if (!name) { showToast("Enter a category name", "error"); return; }

            try {
                await fetch(`${API_BASE}/categories`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, color: selectedColor })
                });
                closeCategoryModal();
                await fetchBookmarks();
                showToast(`Category "${name}" added!`, "success");
            } catch (err) {
                showToast("Error adding category", "error");
            }
        }

        // ── Utilities ──
        function clearForm() {
            document.getElementById("inputUrl").value = "";
            document.getElementById("inputNote").value = "";
            document.getElementById("inputUrl").focus();
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => showToast("URL copied!", "success"));
        }

        function escapeHtml(text) {
            const d = document.createElement("div");
            d.textContent = text;
            return d.innerHTML;
        }

        function showToast(msg, type = "success") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ── Theme toggle ──
        const MOON_SVG = `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`;
        const SUN_SVG  = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

        function applyTheme(isLight) {
            document.documentElement.setAttribute("data-theme", isLight ? "light" : "dark");
            document.getElementById("themeIcon").innerHTML = isLight ? SUN_SVG : MOON_SVG;
        }

        function toggleTheme() {
            const isLight = document.documentElement.getAttribute("data-theme") !== "light";
            localStorage.setItem("ericnotes-theme", isLight ? "light" : "dark");
            applyTheme(isLight);
        }

        // Apply saved preference on load
        applyTheme(localStorage.getItem("ericnotes-theme") === "light");

        // ── Close modals on backdrop click ──
        document.querySelectorAll(".modal-overlay").forEach(overlay => {
            overlay.addEventListener("click", e => {
                if (e.target === overlay) overlay.classList.remove("active");
            });
        });
    </script>
</body>
</html>
